<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VesselTracker Admin</title>
    <style>
        :root {
            --bg-main: #020c1a;
            --bg-card: #0a1628;
            --bg-elevated: #111d32;
            --text-main: #e2e8f0;
            --text-soft: #94a3b8;
            --accent: #0ea5e9;
            --accent-soft: rgba(14,165,233,.15);
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
            --border: rgba(148,163,184,.15);
            --sans: system-ui, -apple-system, sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg-main);
            color: var(--text-main);
            font-family: var(--sans);
            line-height: 1.5;
            min-height: 100vh;
        }
        .admin-tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
        .admin-tab {
            padding: 6px 16px; border-radius: 20px;
            border: 1px solid var(--border); background: var(--bg-elevated);
            color: var(--text-soft); font-size: .75rem; cursor: pointer;
            transition: all .15s;
        }
        .admin-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
        .admin-tab:hover:not(.active) { background: rgba(148,163,184,.1); }
        .admin-table { width: 100%; border-collapse: collapse; font-size: .73rem; }
        .admin-table th {
            text-align: left; padding: 8px 6px;
            border-bottom: 2px solid var(--border); color: var(--text-soft); font-weight: 600;
        }
        .admin-table td { padding: 7px 6px; border-bottom: 1px solid var(--border); vertical-align: middle; }
        .admin-table input[type="checkbox"] { width: 14px; height: 14px; accent-color: var(--accent); cursor: pointer; }
        .badge { display: inline-block; padding: 2px 7px; border-radius: 10px; font-size: .65rem; }
        .action-btn {
            background: none; border: 1px solid var(--border); border-radius: 4px;
            color: var(--text-soft); cursor: pointer; padding: 3px 8px; font-size: .68rem; margin: 0 2px;
            transition: all .15s;
        }
        .action-btn:hover { opacity: .8; }
        .action-btn.danger { color: var(--danger); border-color: var(--danger); }
        .action-btn.success { color: var(--success); border-color: var(--success); }
        .btn {
            display: inline-block; padding: 8px 18px; border-radius: 6px;
            border: none; cursor: pointer; font-size: .8rem; font-weight: 500;
            transition: opacity .15s;
        }
        .btn:hover { opacity: .85; }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-secondary { background: var(--bg-elevated); border: 1px solid var(--border); color: var(--text-main); }
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,.6); display: flex; align-items: center; justify-content: center;
            z-index: 9999;
        }
        .modal-inner {
            background: var(--bg-card); padding: 20px; border-radius: 12px;
            max-width: 400px; width: 90%; color: var(--text-main);
        }
        .modal-inner h3 { margin: 0 0 12px; font-size: .95rem; }
        .modal-inner label { display: block; font-size: .73rem; color: var(--text-soft); margin: 8px 0 3px; }
        .modal-inner input, .modal-inner select {
            width: 100%; background: var(--bg-elevated); border: 1px solid var(--border);
            border-radius: 6px; padding: 6px 8px; color: var(--text-main); font-size: .78rem;
        }
        .login-prompt {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 60vh; text-align: center; gap: 1rem;
        }
        select, textarea {
            background: var(--bg-elevated); border: 1px solid var(--border);
            border-radius: 6px; padding: 6px 8px; color: var(--text-main); font-size: .78rem;
        }
        textarea { width: 100%; resize: vertical; }
        /* Visual cues for the Fleet tab */
        .sanc-badge {
            display: inline-block; padding: 1px 6px; border-radius: 8px;
            font-size: .6rem; font-weight: 700; letter-spacing: .03em;
            background: rgba(255,69,0,.15); color: #ff6b35; border: 1px solid rgba(255,69,0,.4);
            margin-left: 6px; vertical-align: middle;
        }
        .stale-dot {
            display: inline-block; width: 8px; height: 8px; border-radius: 50%;
            margin-right: 6px; vertical-align: middle;
        }
        .stale-dot.fresh { background: var(--success); }
        .stale-dot.warn  { background: var(--warning); }
        .stale-dot.stale { background: var(--danger); }
        .stale-dot.none  { background: var(--text-soft); opacity: .4; }
        .failures-card {
            background: var(--bg-elevated); border: 1px solid rgba(239,68,68,.25);
            border-radius: 8px; padding: 10px 12px; margin-bottom: 14px;
        }
        .failures-card .title {
            font-weight: 700; font-size: .8rem; color: var(--danger); margin-bottom: 6px;
        }
        .failures-row {
            display: flex; align-items: center; gap: 10px;
            padding: 5px 0; border-bottom: 1px solid var(--border); font-size: .73rem;
        }
        .failures-row:last-child { border-bottom: none; }
        .failures-row .imo  { font-weight: 600; color: var(--text-main); min-width: 70px; }
        .failures-row .name { flex: 1; color: var(--text-soft); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .failures-row .cnt  { color: var(--danger); font-weight: 600; }
        /* Handoff tab */
        .handoff-pill {
            display: inline-block; padding: 2px 8px; border-radius: 10px;
            font-size: .65rem; font-weight: 600; letter-spacing: .02em;
        }
        .handoff-pill.pending  { background: rgba(245,158,11,.18); color: var(--warning); border: 1px solid rgba(245,158,11,.4); }
        .handoff-pill.accepted { background: rgba(16,185,129,.18); color: var(--success); border: 1px solid rgba(16,185,129,.4); }
        .handoff-pill.declined { background: rgba(239,68,68,.18);  color: var(--danger);  border: 1px solid rgba(239,68,68,.4); }
        .handoff-type {
            display: inline-block; padding: 1px 7px; border-radius: 4px;
            font-size: .62rem; font-weight: 700; letter-spacing: .04em;
            background: var(--bg-elevated); border: 1px solid var(--border); color: var(--text-soft);
        }
        .handoff-type.sof     { color: #38bdf8; border-color: rgba(56,189,248,.4); }
        .handoff-type.dossier { color: #c084fc; border-color: rgba(192,132,252,.4); }
        .filter-chip {
            display: inline-block; padding: 4px 10px; border-radius: 16px;
            border: 1px solid var(--border); background: var(--bg-elevated);
            color: var(--text-soft); font-size: .7rem; cursor: pointer;
            margin-right: 6px; margin-bottom: 6px; transition: all .12s;
        }
        .filter-chip:hover  { border-color: var(--accent); }
        .filter-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
        .handoff-detail {
            background: var(--bg-elevated); border: 1px solid var(--border);
            border-radius: 8px; padding: 12px;
            font-size: .73rem; color: var(--text-main);
            max-height: 60vh; overflow-y: auto;
        }
        .handoff-detail .kv { display: flex; gap: 10px; padding: 4px 0; border-bottom: 1px solid var(--border); }
        .handoff-detail .kv:last-child { border-bottom: none; }
        .handoff-detail .kv .k { font-weight: 600; color: var(--text-soft); min-width: 130px; }
        .handoff-detail .kv .v { flex: 1; word-break: break-word; }
        .handoff-detail pre {
            background: var(--bg-card); border-radius: 4px; padding: 6px 8px;
            font-size: .68rem; overflow-x: auto; color: var(--text-soft);
            white-space: pre-wrap; max-height: 200px; overflow-y: auto;
        }
        .handoff-detail .ops-table {
            width: 100%; border-collapse: collapse; margin-top: 4px; font-size: .68rem;
        }
        .handoff-detail .ops-table th, .handoff-detail .ops-table td {
            padding: 3px 6px; border: 1px solid var(--border); text-align: left;
        }
        .handoff-detail .ops-table th { background: var(--bg-card); color: var(--text-soft); }
    </style>
</head>
<body>
    <div id="app">
        <div style="padding:12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);">
            <h1 style="margin:0;font-size:1.1rem;">⚙️ Admin Dashboard</h1>
            <button onclick="window.location.href='../'" class="action-btn">← Back to Tracker</button>
        </div>
        <div style="padding:16px;" id="mainContent">
            <div style="padding:40px;text-align:center;color:var(--text-soft);">Initialising…</div>
        </div>
        <div id="adminToasts" style="position:fixed;bottom:12px;right:12px;z-index:9999;"></div>
    </div>

    <script>
    (function() {
        // ── CONFIG & GLOBALS ─────────────────────────────────────────
        // Token is handed off via sessionStorage by admin.js (NOT in URL —
        // URL params leak in browser history, server logs, and Referer headers).
        // Backwards-compat: still accept ?token=… so existing bookmarks work,
        // but immediately migrate it into sessionStorage and strip from URL.
        var token = null;
        try {
            var urlParams = new URLSearchParams(window.location.search);
            var legacyToken = urlParams.get('token');
            if (legacyToken) {
                sessionStorage.setItem('vt_admin_token', legacyToken);
                sessionStorage.setItem('vt_admin_token_ts', String(Date.now()));
                // Strip token from the URL bar so it doesn't get bookmarked/shared
                history.replaceState(null, '', window.location.pathname);
            }
            token = sessionStorage.getItem('vt_admin_token');
            // Token expires after 1 hour of inactivity in this tab
            var ts = parseInt(sessionStorage.getItem('vt_admin_token_ts') || '0', 10);
            if (token && ts && Date.now() - ts > 60 * 60 * 1000) {
                sessionStorage.removeItem('vt_admin_token');
                sessionStorage.removeItem('vt_admin_token_ts');
                token = null;
            }
        } catch(e) { console.error('sessionStorage error:', e); }

        var mainEl = document.getElementById('mainContent');

        function showLoginPrompt(reason) {
            mainEl.innerHTML = '<div class="login-prompt">'
                + '<div style="font-size:2rem;">🔐</div>'
                + '<h2>' + (reason || 'Login Required') + '</h2>'
                + '<p style="color:var(--text-soft);max-width:300px;">Please return to the main app and re-open the dashboard from the admin panel.</p>'
                + '<button onclick="window.location.href=\'../\'" style="padding:10px 24px;font-size:.9rem;border-radius:8px;background:var(--accent);color:#fff;border:none;cursor:pointer;">← Back to Tracker</button>'
                + '</div>';
        }

        if (!token) {
            showLoginPrompt('Login Required');
            return;
        }

        window.CONFIG = { WORKER_URL: '/api' };
        window.S = { currentUser: { access_token: token } };

        // ── UTILITIES ────────────────────────────────────────────────
        function esc(s) {
            if (!s) return '';
            return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
        }
        function validateIMO(imo) {
            if (!/^\d{7}$/.test(imo)) return false;
            var d = imo.split('').map(Number);
            return d[6] === d.slice(0,6).reduce(function(s,dd,i){ return s+dd*(7-i); },0) % 10;
        }
        async function api(url, options, timeout) {
            timeout = timeout || 8000;
            var ctrl = new AbortController();
            var id = setTimeout(function(){ ctrl.abort(); }, timeout);
            try {
                var r = await fetch(url, Object.assign({}, options, { signal: ctrl.signal }));
                clearTimeout(id);
                return r;
            } catch(e) { clearTimeout(id); throw e; }
        }
        function showToast(msg, type) {
            var container = document.getElementById('adminToasts');
            if (!container) return;
            var toast = document.createElement('div');
            var color = type === 'danger' ? 'var(--danger)' : type === 'success' ? 'var(--success)' : 'var(--text-main)';
            toast.style.cssText = 'background:var(--bg-card);border:1px solid '+color+';border-radius:8px;padding:8px 14px;margin:4px 0;font-size:.73rem;color:'+color+';box-shadow:0 2px 8px rgba(0,0,0,.3);';
            toast.textContent = msg;
            container.appendChild(toast);
            setTimeout(function(){ toast.remove(); }, 3500);
        }

        // ── STATE ────────────────────────────────────────────────────
        var allUsers = [];
        var allVessels = [];
        var allFailures = [];     // [{ imo, count, name, trackers }]
        var allHandoffs = [];     // [{ id, type, from_username, to_username, imo, vessel_name, status, created_at, responded_at, notes, ... }]
        var handoffStats = null;  // { total, sof, dossier, pending, accepted, declined }
        var handoffFilter = 'all'; // 'all' | 'sof' | 'dossier' | 'pending' | 'accepted' | 'declined'
        var serverTime = null;    // ISO string sent by /admin/full-data
        var currentTab = 'fleet';

        // ── HELPERS ──────────────────────────────────────────────────
        // Vessels older than 6h are red, 1–6h yellow, fresh green.
        // Returns { cls, label, hoursAgo } or null when there's no timestamp.
        function staleness(updatedAtIso) {
            if (!updatedAtIso) return { cls: 'none', label: '—', hoursAgo: null };
            var now = serverTime ? new Date(serverTime).getTime() : Date.now();
            var t = new Date(updatedAtIso).getTime();
            if (isNaN(t)) return { cls: 'none', label: '—', hoursAgo: null };
            var h = (now - t) / 3600000;
            var cls = h > 6 ? 'stale' : h > 1 ? 'warn' : 'fresh';
            var label = h < 1
                ? Math.max(0, Math.round(h * 60)) + 'm ago'
                : h < 24 ? Math.round(h) + 'h ago'
                : Math.round(h / 24) + 'd ago';
            return { cls: cls, label: label, hoursAgo: h };
        }

        // Plain relative timestamp — "3h ago", "2d ago", "never". Used for
        // last-login and handoff dates where we don't want a coloured dot.
        function formatRelative(iso) {
            if (!iso) return 'never';
            var t = new Date(iso).getTime();
            if (isNaN(t)) return '—';
            var now = serverTime ? new Date(serverTime).getTime() : Date.now();
            var diff = (now - t) / 1000;
            if (diff < 60)         return Math.max(1, Math.round(diff)) + 's ago';
            if (diff < 3600)       return Math.round(diff / 60) + 'm ago';
            if (diff < 86400)      return Math.round(diff / 3600) + 'h ago';
            if (diff < 86400 * 30) return Math.round(diff / 86400) + 'd ago';
            return new Date(iso).toLocaleDateString('en-GB', { year: 'numeric', month: 'short', day: '2-digit' });
        }

        function formatAbsolute(iso) {
            if (!iso) return '—';
            var d = new Date(iso); if (isNaN(d.getTime())) return '—';
            return d.toLocaleString('en-GB', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
        }

        // ── API LOAD ─────────────────────────────────────────────────
        async function loadData() {
            showToast('Loading data…', 'info');
            try {
                var res = await api(
                    window.CONFIG.WORKER_URL + '/admin/full-data',
                    { headers: { Authorization: 'Bearer ' + token } },
                    15000
                );
                if (res.status === 401 || res.status === 403) {
                    // Token is invalid or user lost admin rights — clear and re-prompt
                    try {
                        sessionStorage.removeItem('vt_admin_token');
                        sessionStorage.removeItem('vt_admin_token_ts');
                    } catch(_) {}
                    showLoginPrompt(res.status === 403 ? 'Forbidden' : 'Session Expired');
                    return false;
                }
                if (!res.ok) throw new Error('HTTP ' + res.status);
                var data = await res.json();
                allUsers = data.users || [];
                allVessels = data.vessels || [];
                allFailures = data.failures || [];
                serverTime = data.server_time || null;
                showToast('Data loaded', 'success');
                return true;
            } catch(e) {
                showToast('Error: ' + e.message, 'danger');
                return false;
            }
        }

        // ── TAB SWITCHING ────────────────────────────────────────────
        async function switchTab(tabId) {
            currentTab = tabId;
            document.querySelectorAll('.admin-tab').forEach(function(b) {
                b.classList.toggle('active', b.getAttribute('data-id') === tabId);
            });
            document.getElementById('tabContent').innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-soft);">Loading…</div>';
            if (!allUsers.length) {
                var ok = await loadData();
                if (!ok) return;
            }
            renderTabContent();
        }

        function renderTabContent() {
            var cnt = document.getElementById('tabContent');
            if (currentTab === 'fleet') renderFleetTab(cnt);
            else if (currentTab === 'bulk') renderBulkTab(cnt);
            else if (currentTab === 'users') renderUsersTab(cnt);
            else if (currentTab === 'handoffs') renderHandoffsTab(cnt);
        }

        // ── FLEET TAB ────────────────────────────────────────────────
        function renderFleetTab(cnt) {
            var totalVessels = allVessels.length;
            var trackingUsers = allVessels.reduce(function(acc, v) { return acc + (v.tracking_users ? v.tracking_users.length : 0); }, 0);
            var sanctionedCount = allVessels.filter(function(v){ return v.sanctioned; }).length;
            var staleCount      = allVessels.filter(function(v){ var s = staleness(v.updated_at); return s.cls === 'stale'; }).length;
            var failuresCount   = allFailures.length;

            // Stat row — five small KPIs
            var statsHtml = '<div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;">' +
                '<div style="flex:1;min-width:90px;background:var(--bg-elevated);border-radius:8px;padding:8px;text-align:center;">' +
                    '<div style="font-size:1.2rem;font-weight:700;">'+totalVessels+'</div><div style="font-size:.62rem;color:var(--text-soft);">Vessels</div></div>' +
                '<div style="flex:1;min-width:90px;background:var(--bg-elevated);border-radius:8px;padding:8px;text-align:center;">' +
                    '<div style="font-size:1.2rem;font-weight:700;">'+trackingUsers+'</div><div style="font-size:.62rem;color:var(--text-soft);">Trackings</div></div>' +
                '<div style="flex:1;min-width:90px;background:var(--bg-elevated);border-radius:8px;padding:8px;text-align:center;">' +
                    '<div style="font-size:1.2rem;font-weight:700;">'+allUsers.length+'</div><div style="font-size:.62rem;color:var(--text-soft);">Users</div></div>' +
                '<div style="flex:1;min-width:90px;background:var(--bg-elevated);border-radius:8px;padding:8px;text-align:center;'
                    +(sanctionedCount?'border:1px solid rgba(255,69,0,.4);':'')+'">' +
                    '<div style="font-size:1.2rem;font-weight:700;color:'+(sanctionedCount?'#ff6b35':'var(--text-main)')+';">'+sanctionedCount+'</div>' +
                    '<div style="font-size:.62rem;color:var(--text-soft);">🚨 Sanctioned</div></div>' +
                '<div style="flex:1;min-width:90px;background:var(--bg-elevated);border-radius:8px;padding:8px;text-align:center;'
                    +(staleCount?'border:1px solid rgba(239,68,68,.4);':'')+'">' +
                    '<div style="font-size:1.2rem;font-weight:700;color:'+(staleCount?'var(--danger)':'var(--text-main)')+';">'+staleCount+'</div>' +
                    '<div style="font-size:.62rem;color:var(--text-soft);">Stale &gt;6h</div></div>' +
                '<div style="flex:1;min-width:90px;background:var(--bg-elevated);border-radius:8px;padding:8px;text-align:center;'
                    +(failuresCount?'border:1px solid rgba(239,68,68,.4);':'')+'">' +
                    '<div style="font-size:1.2rem;font-weight:700;color:'+(failuresCount?'var(--danger)':'var(--text-main)')+';">'+failuresCount+'</div>' +
                    '<div style="font-size:.62rem;color:var(--text-soft);">Scrape Fails</div></div>' +
                '</div>';

            // Failure card — only shown if there are any flapping IMOs
            var failuresHtml = '';
            if (allFailures.length) {
                var rowsHtml = allFailures.slice(0, 25).map(function(f){
                    var trackerStr = (f.trackers && f.trackers.length) ? f.trackers.map(esc).join(', ') : '<em style="color:var(--text-soft);opacity:.7;">untracked</em>';
                    return '<div class="failures-row">' +
                        '<span class="imo">'+esc(f.imo)+'</span>' +
                        '<span class="name">'+esc(f.name)+'</span>' +
                        '<span class="cnt" title="Consecutive scrape failures">'+f.count+' fail'+(f.count===1?'':'s')+'</span>' +
                        '<span style="color:var(--text-soft);font-size:.68rem;max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+trackerStr+'</span>' +
                        '</div>';
                }).join('');
                var moreHtml = allFailures.length > 25
                    ? '<div style="margin-top:6px;font-size:.68rem;color:var(--text-soft);">+ '+(allFailures.length - 25)+' more…</div>' : '';
                failuresHtml = '<div class="failures-card">' +
                    '<div class="title">⚠️ Scraper failures (' + allFailures.length + ')</div>' +
                    rowsHtml + moreHtml +
                    '</div>';
            }

            // Vessel table — sanction badge + freshness dot + tooltip
            var tableHtml = '<div style="overflow-x:auto;">' +
                '<table class="admin-table"><thead><tr>' +
                    '<th><input type="checkbox" id="fleetCheckAll" title="Select all"></th>' +
                    '<th>IMO</th><th>Vessel</th><th>Flag</th><th>Status</th>' +
                    '<th>Last AIS</th><th>Tracked by</th><th></th>' +
                '</tr></thead><tbody>' +
                allVessels.map(function(v) {
                    var s = staleness(v.updated_at);
                    var sancBadge = v.sanctioned
                        ? '<span class="sanc-badge" title="'+esc((v.sanction_lists||[]).join(' · '))+'">🚨 SANC</span>'
                        : '';
                    var usersStr = (v.tracking_users || []).map(function(u){ return esc(u.username); }).join(', ') || '<em style="color:var(--text-soft);opacity:.7;">—</em>';
                    return '<tr'+(v.sanctioned?' style="background:rgba(255,69,0,.04);"':'')+'>' +
                        '<td><input type="checkbox" class="fleet-check" data-imo="'+v.imo+'"></td>' +
                        '<td>'+esc(v.imo)+'</td>' +
                        '<td>'+esc(v.name || 'IMO '+v.imo)+sancBadge+'</td>' +
                        '<td>'+esc(v.flag || '—')+'</td>' +
                        '<td>'+(v.status || 'PENDING')+'</td>' +
                        '<td><span class="stale-dot '+s.cls+'" title="Last AIS update"></span>'+esc(s.label)+'</td>' +
                        '<td>'+usersStr+'</td>' +
                        '<td><button onclick="window._removeGlobal(\''+v.imo+'\')" class="action-btn danger" title="Remove from ALL trackers">✕</button></td>' +
                    '</tr>';
                }).join('') +
                '</tbody></table></div>' +
                '<div style="margin-top:10px;"><button onclick="window._bulkRemove()" class="action-btn danger">🗑 Remove Selected</button></div>';

            cnt.innerHTML = statsHtml + failuresHtml + tableHtml;

            // Wire up "select all" checkbox
            var checkAll = document.getElementById('fleetCheckAll');
            if (checkAll) {
                checkAll.onclick = function() {

            window._bulkAdd = async function() {

                try {

                        body: JSON.stringify({ admin_token: token, user_id: userId, imos: imos })
                    }, 30000);

                    if (!res.ok) throw new Error(data.error || 'Request failed');

                    document.getElementById('bulkResult').innerHTML = '✅ ' + (data.added||0) + ' added, ' + (data.skipped||0) + ' skipped.';

        // ── HANDOFFS TAB ─────────────────────────────────────────────
        // Lazy-loads on first switch — handoff data is its own endpoint
        // (/admin/handoffs) so it doesn't bloat the initial dashboard payload.
        async function renderHandoffsTab(cnt) {
            cnt.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-soft);">Loading handoffs…</div>';

            // Always re-fetch when the tab is opened so the admin sees current state
            try {
                var res = await api(window.CONFIG.WORKER_URL + '/admin/handoffs',
                    { headers: { Authorization: 'Bearer ' + token } }, 15000);
                if (res.status === 401 || res.status === 403) {
                    showLoginPrompt(res.status === 403 ? 'Forbidden' : 'Session Expired');
                    return;
                }
                if (!res.ok) throw new Error('HTTP ' + res.status);
                var data = await res.json();
                allHandoffs  = data.handoffs || [];
                handoffStats = data.stats || null;
            } catch(e) {
                cnt.innerHTML = '<div style="padding:20px;color:var(--danger);">Failed to load handoffs: ' + esc(e.message) + '</div>';
                return;
            }

            paintHandoffs(cnt);
        }

        function paintHandoffs(cnt) {
            var s = handoffStats || { total:0, sof:0, dossier:0, pending:0, accepted:0, declined:0 };

            // Top stats row
            var statsHtml = '<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;">' +
                '<div style="flex:1;min-width:90px;background:var(--bg-elevated);border-radius:8px;padding:8px;text-align:center;">' +
                    '<div style="font-size:1.2rem;font-weight:700;">'+s.total+'</div><div style="font-size:.62rem;color:var(--text-soft);">Total</div></div>' +
                '<div style="flex:1;min-width:90px;background:var(--bg-elevated);border-radius:8px;padding:8px;text-align:center;">' +
                    '<div style="font-size:1.2rem;font-weight:700;color:#38bdf8;">'+s.sof+'</div><div style="font-size:.62rem;color:var(--text-soft);">SOF</div></div>' +
                '<div style="flex:1;min-width:90px;background:var(--bg-elevated);border-radius:8px;padding:8px;text-align:center;">' +
                    '<div style="font-size:1.2rem;font-weight:700;color:#c084fc;">'+s.dossier+'</div><div style="font-size:.62rem;color:var(--text-soft);">Dossier</div></div>' +
                '<div style="flex:1;min-width:90px;background:var(--bg-elevated);border-radius:8px;padding:8px;text-align:center;">' +
                    '<div style="font-size:1.2rem;font-weight:700;color:var(--warning);">'+s.pending+'</div><div style="font-size:.62rem;color:var(--text-soft);">Pending</div></div>' +
                '<div style="flex:1;min-width:90px;background:var(--bg-elevated);border-radius:8px;padding:8px;text-align:center;">' +
                    '<div style="font-size:1.2rem;font-weight:700;color:var(--success);">'+s.accepted+'</div><div style="font-size:.62rem;color:var(--text-soft);">Accepted</div></div>' +
                '<div style="flex:1;min-width:90px;background:var(--bg-elevated);border-radius:8px;padding:8px;text-align:center;">' +
                    '<div style="font-size:1.2rem;font-weight:700;color:var(--danger);">'+s.declined+'</div><div style="font-size:.62rem;color:var(--text-soft);">Declined</div></div>' +
                '</div>';

            // Filter chips — all / sof / dossier / pending / accepted / declined
            var chips = [
                { id: 'all',      label: 'All ('+s.total+')' },
                { id: 'sof',      label: 'SOF ('+s.sof+')' },
                { id: 'dossier',  label: 'Dossier ('+s.dossier+')' },
                { id: 'pending',  label: 'Pending ('+s.pending+')' },
                { id: 'accepted', label: 'Accepted ('+s.accepted+')' },
                { id: 'declined', label: 'Declined ('+s.declined+')' }
            ];
            var chipsHtml = '<div style="margin-bottom:10px;">' +
                chips.map(function(c){
                    return '<button class="filter-chip ' + (handoffFilter === c.id ? 'active' : '') + '" '
                         + 'onclick="window._setHandoffFilter(\'' + c.id + '\')">' + esc(c.label) + '</button>';
                }).join('') +
                '<button onclick="window._reloadHandoffs()" class="filter-chip" style="margin-left:auto;float:right;">🔄 Refresh</button>' +
                '</div>';

            // Apply filter
            var filtered = allHandoffs.filter(function(h) {
                if (handoffFilter === 'all') return true;
                if (handoffFilter === 'sof' || handoffFilter === 'dossier') return h.type === handoffFilter;
                return h.status === handoffFilter; // pending/accepted/declined
            });

            var tableHtml;
            if (!filtered.length) {
                tableHtml = '<div style="padding:30px;text-align:center;color:var(--text-soft);font-size:.78rem;">No handoffs match this filter.</div>';
            } else {
                tableHtml = '<div style="overflow-x:auto;">' +
                    '<table class="admin-table"><thead><tr>' +
                        '<th>Type</th><th>Date sent</th><th>From → To</th><th>Vessel</th>' +
                        '<th>Status</th><th>Responded</th><th></th>' +
                    '</tr></thead><tbody>' +
                    filtered.map(function(h) {
                        var notesAttr = h.notes ? ' title="' + esc(h.notes) + '"' : '';
                        return '<tr' + notesAttr + '>' +
                            '<td><span class="handoff-type ' + h.type + '">' + h.type.toUpperCase() + '</span></td>' +
                            '<td><span title="' + esc(formatAbsolute(h.created_at)) + '">' + esc(formatRelative(h.created_at)) + '</span></td>' +
                            '<td>' + esc(h.from_username || '?') + ' → <strong>' + esc(h.to_username || '?') + '</strong></td>' +
                            '<td>' + esc(h.vessel_name || '') + ' <span style="color:var(--text-soft);">(' + esc(h.imo) + ')</span></td>' +
                            '<td><span class="handoff-pill ' + h.status + '">' + h.status.toUpperCase() + '</span></td>' +
                            '<td>' + (h.responded_at
                                ? '<span title="' + esc(formatAbsolute(h.responded_at)) + '">' + esc(formatRelative(h.responded_at)) + '</span>'
                                : '<span style="color:var(--text-soft);opacity:.5;">—</span>') + '</td>' +
                            '<td><button class="action-btn js-view-handoff" data-handoff-type="' + esc(h.type) + '" data-handoff-id="' + esc(String(h.id)) + '" title="View full content">👁 View</button></td>' +
                        '</tr>';
                    }).join('') +
                    '</tbody></table></div>';
            }

            cnt.innerHTML = statsHtml + chipsHtml + tableHtml;

            // Event delegation — wire all View buttons in this tab. Using
            // delegation (instead of inline onclick) means special characters
            // in IDs or types can never break the onclick attribute syntax.
            cnt.querySelectorAll('.js-view-handoff').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    var t = btn.getAttribute('data-handoff-type');
                    var i = btn.getAttribute('data-handoff-id');
                    window._viewHandoff(t, i);
                });
            });
        }

        window._setHandoffFilter = function(id) {
            handoffFilter = id;
            paintHandoffs(document.getElementById('tabContent'));
        };

        window._reloadHandoffs = function() {
            renderHandoffsTab(document.getElementById('tabContent'));
        };

        window._viewHandoff = async function(type, id) {
            try {
                // Open modal placeholder immediately so the admin gets visual feedback
                var existing = document.getElementById('handoffViewModal');
                if (existing) existing.remove();
                document.body.insertAdjacentHTML('beforeend',
                    '<div class="modal" id="handoffViewModal">' +
                    '<div class="modal-inner" style="max-width:640px;">' +
                    '<h3>Loading…</h3>' +
                    '<div class="handoff-detail" id="handoffDetailBody">'
                    + '<div style="padding:20px;text-align:center;color:var(--text-soft);">Fetching handoff…</div></div>' +
                    '<div style="margin-top:12px;text-align:right;">' +
                    '<button onclick="document.getElementById(\'handoffViewModal\').remove()" class="btn btn-secondary">Close</button>' +
                    '</div></div></div>');
            } catch(e) {
                // If the modal can't be inserted (extremely unusual), fall back to a toast
                console.error('[_viewHandoff] modal insertion failed:', e);
                showToast('Could not open handoff view: ' + e.message, 'danger');
                return;
            }

            // The handoff list (allHandoffs) already has everything except draft_data.
            // We pre-populate the modal from it so the user sees something even if
            // the worker route isn't deployed yet.
            var fallback = (allHandoffs || []).find(function(h) {
                return h.type === type && String(h.id) === String(id);
            });
            if (fallback) {
                paintHandoffModal(Object.assign({}, fallback, { _partial: true }));
            }

            try {
                var res = await api(window.CONFIG.WORKER_URL + '/admin/handoff/' + type + '/' + id,
                    { headers: { Authorization: 'Bearer ' + token } }, 10000);

                if (res.status === 404) {
                    // Two sub-cases — the route exists but the row is gone, OR the
                    // route doesn't exist on the worker yet. Both arrive as 404; we
                    // tell them apart by the response shape (our route returns
                    // {error:'Handoff not found'}, the default returns {error:'Not found'}).
                    var errBody = await res.json().catch(function(){ return {}; });
                    var routeMissing = errBody.error === 'Not found';
                    if (routeMissing && fallback) {
                        // We already painted the partial — append a hint banner.
                        var bodyEl = document.getElementById('handoffDetailBody');
                        if (bodyEl) {
                            bodyEl.insertAdjacentHTML('afterbegin',
                                '<div style="background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.4);'
                                + 'border-radius:6px;padding:8px 10px;margin-bottom:10px;font-size:.7rem;color:var(--warning);">'
                                + '⚠️ Worker route not deployed yet — showing partial data from list. '
                                + 'Redeploy <code>Cloudflare_worker.js</code> to see <code>draft_data</code>.</div>');
                        }
                        return;
                    }
                    // Row really doesn't exist
                    var body1 = document.getElementById('handoffDetailBody');
                    if (body1) body1.innerHTML = '<div style="color:var(--danger);padding:10px;">Handoff #' + esc(String(id)) + ' not found in database.</div>';
                    return;
                }

                if (!res.ok) {
                    var err = await res.json().catch(function(){ return {}; });
                    throw new Error(err.error || 'HTTP ' + res.status);
                }
                var data = await res.json();
                paintHandoffModal(data.handoff);
            } catch(e) {
                console.error('[_viewHandoff] fetch failed:', e);
                var body2 = document.getElementById('handoffDetailBody');
                if (body2) body2.innerHTML = '<div style="color:var(--danger);padding:10px;">' + esc(e.message) + '</div>';
            }
        };

        // Paint the modal contents — pulled out so the fallback path can reuse it.
        function paintHandoffModal(h) {
            var modal = document.getElementById('handoffViewModal');
            if (!modal) return;
            var hd = modal.querySelector('h3');
            if (hd) hd.innerHTML =
                '<span class="handoff-type ' + h.type + '">' + h.type.toUpperCase() + '</span> '
                + esc(h.vessel_name || ('IMO ' + h.imo))
                + ' <span class="handoff-pill ' + h.status + '" style="margin-left:6px;">' + h.status + '</span>';
            var body = document.getElementById('handoffDetailBody');
            if (body) body.innerHTML = renderHandoffDetail(h);
        }

        // Render the handoff body — generic for both SOF and dossier.
        // SOF draft_data is a flat-ish object with the form fields the user
        // had filled in; dossier has port/templates. We render top-level
        // primitive keys as KV rows, arrays of objects as small tables, and
        // anything else as a compact JSON dump.
        function renderHandoffDetail(h) {
            var meta = '';
            meta += '<div class="kv"><div class="k">From</div><div class="v">'+esc(h.from_username||'?')+'</div></div>';
            meta += '<div class="kv"><div class="k">To</div><div class="v">'+esc(h.to_username||'?')+'</div></div>';
            meta += '<div class="kv"><div class="k">IMO</div><div class="v">'+esc(h.imo||'')+'</div></div>';
            meta += '<div class="kv"><div class="k">Vessel</div><div class="v">'+esc(h.vessel_name||'')+'</div></div>';
            meta += '<div class="kv"><div class="k">Sent</div><div class="v">'+esc(formatAbsolute(h.created_at))+' ('+esc(formatRelative(h.created_at))+')</div></div>';
            if (h.responded_at) {
                meta += '<div class="kv"><div class="k">Responded</div><div class="v">'+esc(formatAbsolute(h.responded_at))+' ('+esc(formatRelative(h.responded_at))+')</div></div>';
            }
            if (h.notes) {
                meta += '<div class="kv"><div class="k">Notes</div><div class="v" style="white-space:pre-wrap;">'+esc(h.notes)+'</div></div>';
            }

            var dd = h.draft_data;
            if (!dd || typeof dd !== 'object') {
                return meta + '<div style="margin-top:10px;color:var(--text-soft);font-style:italic;">No draft data.</div>';
            }

            var body = '<div style="margin-top:12px;font-weight:600;color:var(--text-soft);font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;">Draft contents</div>';
            for (var key in dd) {
                if (!Object.prototype.hasOwnProperty.call(dd, key)) continue;
                var v = dd[key];
                if (v === null || v === undefined || v === '') continue;
                body += '<div class="kv"><div class="k">'+esc(key)+'</div><div class="v">'+renderHandoffValue(v)+'</div></div>';
            }
            return meta + body;
        }

        function renderHandoffValue(v) {
            if (v === null || v === undefined) return '<span style="color:var(--text-soft);">—</span>';
            if (typeof v === 'boolean') return v ? '✓ yes' : '✗ no';
            if (typeof v === 'number')  return esc(String(v));
            if (typeof v === 'string')  return esc(v).replace(/\n/g, '<br>');

            if (Array.isArray(v)) {
                if (!v.length) return '<span style="color:var(--text-soft);">empty</span>';
                // Array of plain objects → compact table
                if (typeof v[0] === 'object' && v[0] !== null && !Array.isArray(v[0])) {
                    var keys = Array.from(v.reduce(function(acc, row){
                        Object.keys(row || {}).forEach(function(k){ acc.add(k); });
                        return acc;
                    }, new Set()));
                    if (keys.length && keys.length <= 8) {
                        var html = '<table class="ops-table"><thead><tr>' +
                            keys.map(function(k){ return '<th>'+esc(k)+'</th>'; }).join('') +
                            '</tr></thead><tbody>' +
                            v.map(function(row){
                                return '<tr>' + keys.map(function(k){
                                    var cell = row && row[k] != null ? row[k] : '';
                                    return '<td>'+esc(typeof cell === 'object' ? JSON.stringify(cell) : String(cell))+'</td>';
                                }).join('') + '</tr>';
                            }).join('') +
                            '</tbody></table>';
                        return html;
                    }
                }
                // Plain array (strings, numbers, mixed)
                return v.map(function(item){
                    return typeof item === 'object'
                        ? '<code>'+esc(JSON.stringify(item))+'</code>'
                        : esc(String(item));
                }).join(', ');
            }

            // Object → JSON dump
            try { return '<pre>'+esc(JSON.stringify(v, null, 2))+'</pre>'; }
            catch(_) { return '<span style="color:var(--text-soft);">[unserialisable]</span>'; }
        }

        // ── BROADCAST PUSH NOTIFICATIONS ─────────────────────────────
        // Three recipient modes: All (everyone with a push subscription),
        // Active (allUsers minus frozen — uses already-loaded list, no extra query),
        // or Select (checklist of all users).
        window._broadcastModal = function() {
            var existing = document.getElementById('broadcastModal');
            if (existing) existing.remove();

            // We need allUsers loaded for the Active and Select modes. If the
            // admin opens broadcast before /admin/full-data has returned, prompt.
            if (!allUsers || !allUsers.length) {
                showToast('User list not loaded yet. Try again in a second.', 'warning');
                return;
            }

            var userCheckboxes = allUsers.map(function(u) {
                var label = esc(u.username);
                if (u.is_frozen) label += ' <span style="color:var(--danger);font-size:.65rem;">(frozen)</span>';
                else if (!u.can_add_vessels) label += ' <span style="color:var(--warning);font-size:.65rem;">(restricted)</span>';
                return '<label style="display:flex;align-items:center;gap:6px;font-size:.73rem;padding:3px 0;cursor:pointer;">' +
                    '<input type="checkbox" class="bc-user-check" value="' + esc(u.id) + '"> ' + label +
                '</label>';
            }).join('');

            document.body.insertAdjacentHTML('beforeend',
                '<div class="modal" id="broadcastModal">' +
                '<div class="modal-inner" style="max-width:520px;">' +
                    '<h3>📢 Broadcast Push Notification</h3>' +
                    '<label>Recipients</label>' +
                    '<select id="bcRecipients" onchange="window._bcToggleUserList()">' +
                        '<option value="all">All users (with push subscription)</option>' +
                        '<option value="active">Active users only (skip frozen)</option>' +
                        '<option value="selected">Select users…</option>' +
                    '</select>' +

                    '<div id="bcUserList" style="display:none;max-height:200px;overflow-y:auto;border:1px solid var(--border);' +
                        'border-radius:6px;padding:8px;background:var(--bg-elevated);margin-top:6px;">' +
                        '<div style="display:flex;gap:8px;margin-bottom:6px;padding-bottom:6px;border-bottom:1px solid var(--border);">' +
                            '<button onclick="window._bcSelectAll(true)" class="action-btn" style="flex:1;">Select all</button>' +
                            '<button onclick="window._bcSelectAll(false)" class="action-btn" style="flex:1;">Clear</button>' +
                        '</div>' +
                        userCheckboxes +
                    '</div>' +

                    '<label style="margin-top:10px;">Title <span style="color:var(--text-soft);font-weight:normal;">(max 80)</span></label>' +
                    '<input id="bcTitle" maxlength="80" placeholder="🚢 Quick update">' +

                    '<label style="margin-top:6px;">Message <span style="color:var(--text-soft);font-weight:normal;">(max 500)</span></label>' +
                    '<textarea id="bcMsg" rows="4" maxlength="500" placeholder="Your announcement…"></textarea>' +

                    '<div style="margin-top:14px;display:flex;gap:8px;justify-content:flex-end;">' +
                        '<button onclick="document.getElementById(\'broadcastModal\').remove()" class="btn btn-secondary">Cancel</button>' +
                        '<button onclick="window._sendBroadcast()" class="btn btn-primary">📤 Send</button>' +
                    '</div>' +
                '</div></div>');
        };

        window._bcToggleUserList = function() {
            var sel = document.getElementById('bcRecipients');
            var list = document.getElementById('bcUserList');
            if (sel && list) list.style.display = sel.value === 'selected' ? 'block' : 'none';
        };

        window._bcSelectAll = function(state) {
            document.querySelectorAll('.bc-user-check').forEach(function(c) { c.checked = !!state; });
        };

        window._sendBroadcast = async function() {
            var titleEl = document.getElementById('bcTitle');
            var msgEl   = document.getElementById('bcMsg');
            var modeEl  = document.getElementById('bcRecipients');
            if (!titleEl || !msgEl || !modeEl) return;

            var title = titleEl.value.trim();
            var msg   = msgEl.value.trim();
            var mode  = modeEl.value;
            if (!title || !msg) { showToast('Title and message are required.', 'warning'); return; }

            var userIds = null;
            var recipientLabel = '';
            if (mode === 'selected') {
                var checks = document.querySelectorAll('.bc-user-check:checked');
                userIds = Array.from(checks).map(function(c) { return c.value; });
                if (!userIds.length) { showToast('Select at least one user, or change recipients.', 'warning'); return; }
                recipientLabel = userIds.length + ' selected user' + (userIds.length === 1 ? '' : 's');
            } else if (mode === 'active') {
                userIds = (allUsers || []).filter(function(u) { return !u.is_frozen; }).map(function(u) { return u.id; });
                if (!userIds.length) { showToast('No active users to broadcast to.', 'warning'); return; }
                recipientLabel = userIds.length + ' active user' + (userIds.length === 1 ? '' : 's');
            } else {
                recipientLabel = 'all users with push enabled';
            }

            if (!confirm('Send "' + title + '" to ' + recipientLabel + '?')) return;

            // Disable buttons during send so the admin can't double-fire
            var sendBtn = Array.from(document.querySelectorAll('#broadcastModal button')).find(function(b){ return /Send/.test(b.textContent); });
            if (sendBtn) { sendBtn.disabled = true; sendBtn.textContent = 'Sending…'; }

            try {
                var body = { title: title, message: msg };
                if (userIds) body.user_ids = userIds;
                var res = await api(window.CONFIG.WORKER_URL + '/admin/broadcast', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
                    body: JSON.stringify(body),
                }, 30000);
                if (!res.ok) {
                    var err = await res.json().catch(function(){ return {}; });
                    throw new Error(err.error || 'HTTP ' + res.status);
                }
                var data = await res.json();
                var modal = document.getElementById('broadcastModal');
                if (modal) modal.remove();
                if (data.users_count === 0) {
                    showToast('Sent to 0 users — no one has push enabled.', 'warning');
                } else {
                    var summary = '✅ Reached ' + data.users_count + ' user' + (data.users_count === 1 ? '' : 's')
                                + ' (' + data.sent + ' delivered'
                                + (data.failed ? ', ' + data.failed + ' failed' : '') + ')';
                    showToast(summary, 'success');
                }
            } catch(e) {
                console.error('[broadcast] failed:', e);
                showToast('Broadcast failed: ' + e.message, 'danger');
                if (sendBtn) { sendBtn.disabled = false; sendBtn.textContent = '📤 Send'; }
            }
        };

        // ── INIT ─────────────────────────────────────────────────────
        mainEl.innerHTML =
            '<div style="display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;">' +
                '<div style="font-size:.75rem;color:var(--text-soft);">Admin Dashboard</div>' +
                '<button onclick="window._broadcastModal()" class="btn btn-primary" style="padding:6px 14px;font-size:.78rem;">📢 Broadcast</button>' +
            '</div>' +
            '<div class="admin-tabs" id="tabs"></div>' +
            '<div id="tabContent"><div style="padding:20px;text-align:center;color:var(--text-soft);">Loading…</div></div>';

        var tabDefs = [
            { id:'fleet',    label:'🚢 Fleet Manager' },
            { id:'bulk',     label:'📥 Bulk Add' },
            { id:'users',    label:'👥 User Manager' },
            { id:'handoffs', label:'📋 Handoffs' }
        ];
        var tabsEl = document.getElementById('tabs');
        tabDefs.forEach(function(t) {
            var b = document.createElement('button');
            b.className = 'admin-tab';
            b.setAttribute('data-id', t.id);
            b.textContent = t.label;
            b.onclick = function(){ switchTab(t.id); };
            tabsEl.appendChild(b);
        });

        loadData().then(function(ok){ if (ok) switchTab('fleet'); });
    })();
    </script>
</body>
</html>
