<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VesselTracker Admin</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body { background: var(--bg-main); color: var(--text-main); font-family: var(--sans); margin: 0; padding: 0; }
        .admin-tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
        .admin-tab { padding: 6px 16px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg-elevated); color: var(--text-soft); font-size: .75rem; cursor: pointer; }
        .admin-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
        .admin-table { width: 100%; border-collapse: collapse; font-size: .73rem; }
        .admin-table th { text-align: left; padding: 8px 6px; border-bottom: 2px solid var(--border); color: var(--text-soft); font-weight: 600; }
        .admin-table td { padding: 7px 6px; border-bottom: 1px solid var(--border); vertical-align: middle; }
        .badge { display: inline-block; padding: 2px 7px; border-radius: 10px; font-size: .65rem; }
        .action-btn { background: none; border: 1px solid var(--border); border-radius: 4px; color: var(--text-soft); cursor: pointer; padding: 3px 8px; font-size: .68rem; margin: 0 2px; }
        .action-btn.danger { color: var(--danger); border-color: var(--danger); }
        .action-btn.success { color: var(--success); border-color: var(--success); }
        .login-prompt {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 60vh; text-align: center; gap: 1rem;
        }
    </style>
</head>
<body>
    <div id="app">
        <div style="padding:12px;display:flex;justify-content:space-between;align-items:center;">
            <h1 style="margin:0;font-size:1.1rem;">⚙️ Admin Dashboard</h1>
            <button onclick="window.location.href='../'" class="action-btn">← Back to Tracker</button>
        </div>
        <div style="padding:0 16px;" id="mainContent">
            <!-- Placeholder until auth check completes -->
            <div style="padding:40px;text-align:center;color:var(--text-soft);">Checking session...</div>
        </div>
        <div id="adminToasts" style="position:fixed;bottom:12px;right:12px;z-index:9999;"></div>
    </div>

    <!-- Required dependencies -->
    <script src="../js/i18n.js"></script>
    <script src="../js/auth.js"></script>

    <!-- Bootstrap script – wait for session, then load dashboard -->
    <script>
        (async function() {
            // Ensure auth.js has finished its synchronous setup (loadSession, etc.)
            // If session cookie exists, loadSession already ran during auth.js init.
            // But we'll double-check explicitly.
            const session = window.loadSession(); // call it again to be safe
            const mainContent = document.getElementById('mainContent');

            // Helper to show a login prompt if not authenticated
            function showLoginPrompt() {
                mainContent.innerHTML = `
                    <div class="login-prompt">
                        <div style="font-size:2rem;">🔐</div>
                        <h2 style="margin:0;">Login Required</h2>
                        <p style="color:var(--text-soft); max-width:300px;">
                            You must be logged in to access the admin dashboard.
                        </p>
                        <button onclick="window.location.href='../?login'"
                            style="padding:10px 24px;font-size:.9rem;border-radius:8px;
                                   background:var(--accent);color:#fff;border:none;cursor:pointer;">
                            Go to Login
                        </button>
                    </div>`;
            }

            // If already authenticated, proceed immediately
            if (session && session.access_token) {
                window.S.currentUser = session; // ensure it's set
                initDashboard();
                return;
            }

            // If not, wait a moment – sometimes auth.js's loadSession is called but S.currentUser not explicitly assigned
            if (window.S && window.S.currentUser && window.S.currentUser.access_token) {
                initDashboard();
                return;
            }

            // Final attempt – wait 1.5s for any deferred session load (e.g. from an iframe or cookie change)
            await new Promise(r => setTimeout(r, 1500));
            const delayedSession = window.loadSession();
            if ((delayedSession && delayedSession.access_token) || (window.S && window.S.currentUser && window.S.currentUser.access_token)) {
                if (delayedSession) window.S.currentUser = delayedSession;
                initDashboard();
                return;
            }

            // Still no session – show prompt
            showLoginPrompt();
        })();

        function initDashboard() {
            // Remove placeholder
            const mainContent = document.getElementById('mainContent');
            mainContent.innerHTML = `
                <div class="admin-tabs" id="tabs"></div>
                <div id="tabContent"><div style="padding:20px;text-align:center;color:var(--text-soft);">Loading data...</div></div>
            `;

            // Inject required globals that the dashboard needs (but aren't in auth.js)
            window.escapeHtml = window.escapeHtml || function(str) {
                if (!str) return '';
                return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
            };
            window.validateIMO = window.validateIMO || function(imo) {
                if (!/^\d{7}$/.test(imo)) return false;
                const digits = imo.split('').map(Number);
                const check = digits.slice(0, 6).reduce((sum, d, i) => sum + d * (7 - i), 0) % 10;
                return check === digits[6];
            };
            window.fetchWithTimeout = window.fetchWithTimeout || async function(url, options = {}, timeout = 8000) {
                const ctrl = new AbortController();
                const id = setTimeout(() => ctrl.abort(), timeout);
                try {
                    const r = await fetch(url, { ...options, signal: ctrl.signal });
                    clearTimeout(id);
                    return r;
                } catch(e) { clearTimeout(id); throw e; }
            };

            // Now load the dashboard script
            const script = document.createElement('script');
            script.src = 'admin-dashboard.js';
            script.onload = () => {
                // The dashboard will auto-start once loaded
            };
            document.head.appendChild(script);
        }
    </script>
</body>
</html>
