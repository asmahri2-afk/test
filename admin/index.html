<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VesselTracker Admin</title>
    <style>
        :root {
            --bg-main: #020c1a;
            --bg-card: #0a1628;
            --bg-elevated: #111d32;
            --text-main: #e2e8f0;
            --text-soft: #94a3b8;
            --accent: #0ea5e9;
            --accent-soft: rgba(14,165,233,.15);
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
            --border: rgba(148,163,184,.15);
            --sans: system-ui, -apple-system, sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg-main);
            color: var(--text-main);
            font-family: var(--sans);
            line-height: 1.5;
            min-height: 100vh;
        }
        .admin-tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
        .admin-tab {
            padding: 6px 16px; border-radius: 20px;
            border: 1px solid var(--border); background: var(--bg-elevated);
            color: var(--text-soft); font-size: .75rem; cursor: pointer;
            transition: all .15s;
        }
        .admin-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
        .admin-tab:hover:not(.active) { background: rgba(148,163,184,.1); }
        .admin-table { width: 100%; border-collapse: collapse; font-size: .73rem; }
        .admin-table th {
            text-align: left; padding: 8px 6px;
            border-bottom: 2px solid var(--border); color: var(--text-soft); font-weight: 600;
        }
        .admin-table td { padding: 7px 6px; border-bottom: 1px solid var(--border); vertical-align: middle; }
        .admin-table input[type="checkbox"] { width: 14px; height: 14px; accent-color: var(--accent); cursor: pointer; }
        .badge { display: inline-block; padding: 2px 7px; border-radius: 10px; font-size: .65rem; }
        .action-btn {
            background: none; border: 1px solid var(--border); border-radius: 4px;
            color: var(--text-soft); cursor: pointer; padding: 3px 8px; font-size: .68rem; margin: 0 2px;
            transition: all .15s;
        }
        .action-btn:hover { opacity: .8; }
        .action-btn.danger { color: var(--danger); border-color: var(--danger); }
        .action-btn.success { color: var(--success); border-color: var(--success); }
        .btn {
            display: inline-block; padding: 8px 18px; border-radius: 6px;
            border: none; cursor: pointer; font-size: .8rem; font-weight: 500;
            transition: opacity .15s;
        }
        .btn:hover { opacity: .85; }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-secondary { background: var(--bg-elevated); border: 1px solid var(--border); color: var(--text-main); }
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,.6); display: flex; align-items: center; justify-content: center;
            z-index: 9999;
        }
        .modal-inner {
            background: var(--bg-card); padding: 20px; border-radius: 12px;
            max-width: 400px; width: 90%; color: var(--text-main);
        }
        .modal-inner h3 { margin: 0 0 12px; font-size: .95rem; }
        .modal-inner label { display: block; font-size: .73rem; color: var(--text-soft); margin: 8px 0 3px; }
        .modal-inner input, .modal-inner select {
            width: 100%; background: var(--bg-elevated); border: 1px solid var(--border);
            border-radius: 6px; padding: 6px 8px; color: var(--text-main); font-size: .78rem;
        }
        .login-prompt {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 60vh; text-align: center; gap: 1rem;
        }
        select, textarea {
            background: var(--bg-elevated); border: 1px solid var(--border);
            border-radius: 6px; padding: 6px 8px; color: var(--text-main); font-size: .78rem;
        }
        textarea { width: 100%; resize: vertical; }
        /* Visual cues for the Fleet tab */
        .sanc-badge {
            display: inline-block; padding: 1px 6px; border-radius: 8px;
            font-size: .6rem; font-weight: 700; letter-spacing: .03em;
            background: rgba(255,69,0,.15); color: #ff6b35; border: 1px solid rgba(255,69,0,.4);
            margin-left: 6px; vertical-align: middle;
        }
        .stale-dot {
            display: inline-block; width: 8px; height: 8px; border-radius: 50%;
            margin-right: 6px; vertical-align: middle;
        }
        .stale-dot.fresh { background: var(--success); }
        .stale-dot.warn  { background: var(--warning); }
        .stale-dot.stale { background: var(--danger); }
        .stale-dot.none  { background: var(--text-soft); opacity: .4; }
        .failures-card {
            background: var(--bg-elevated); border: 1px solid rgba(239,68,68,.25);
            border-radius: 8px; padding: 10px 12px; margin-bottom: 14px;
        }
        .failures-card .title {
            font-weight: 700; font-size: .8rem; color: var(--danger); margin-bottom: 6px;
        }
        .failures-row {
            display: flex; align-items: center; gap: 10px;
            padding: 5px 0; border-bottom: 1px solid var(--border); font-size: .73rem;
        }
        .failures-row:last-child { border-bottom: none; }
        .failures-row .imo  { font-weight: 600; color: var(--text-main); min-width: 70px; }
        .failures-row .name { flex: 1; color: var(--text-soft); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .failures-row .cnt  { color: var(--danger); font-weight: 600; }
    </style>
</head>
<body>
    <div id="app">
        <div style="padding:12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);">
            <h1 style="margin:0;font-size:1.1rem;">⚙️ Admin Dashboard</h1>
            <button onclick="window.location.href='../'" class="action-btn">← Back to Tracker</button>
        </div>
        <div style="padding:16px;" id="mainContent">
            <div style="padding:40px;text-align:center;color:var(--text-soft);">Initialising…</div>
        </div>
        <div id="adminToasts" style="position:fixed;bottom:12px;right:12px;z-index:9999;"></div>
    </div>

    <script>
    (function() {
        // ── CONFIG & GLOBALS ─────────────────────────────────────────
        // Token is handed off via sessionStorage by admin.js (NOT in URL —
        // URL params leak in browser history, server logs, and Referer headers).
        // Backwards-compat: still accept ?token=… so existing bookmarks work,
        // but immediately migrate it into sessionStorage and strip from URL.
        var token = null;
        try {
            var urlParams = new URLSearchParams(window.location.search);
            var legacyToken = urlParams.get('token');
            if (legacyToken) {
                sessionStorage.setItem('vt_admin_token', legacyToken);
                sessionStorage.setItem('vt_admin_token_ts', String(Date.now()));
                // Strip token from the URL bar so it doesn't get bookmarked/shared
                history.replaceState(null, '', window.location.pathname);
            }
            token = sessionStorage.getItem('vt_admin_token');
            // Token expires after 1 hour of inactivity in this tab
            var ts = parseInt(sessionStorage.getItem('vt_admin_token_ts') || '0', 10);
            if (token && ts && Date.now() - ts > 60 * 60 * 1000) {
                sessionStorage.removeItem('vt_admin_token');
                sessionStorage.removeItem('vt_admin_token_ts');
                token = null;
            }
        } catch(e) { console.error('sessionStorage error:', e); }

        var mainEl = document.getElementById('mainContent');

        function showLoginPrompt(reason) {
            mainEl.innerHTML = '<div class="login-prompt">'
                + '<div style="font-size:2rem;">🔐</div>'
                + '<h2>' + (reason || 'Login Required') + '</h2>'
                + '<p style="color:var(--text-soft);max-width:300px;">Please return to the main app and re-open the dashboard from the admin panel.</p>'
                + '<button onclick="window.location.href=\'../\'" style="padding:10px 24px;font-size:.9rem;border-radius:8px;background:var(--accent);color:#fff;border:none;cursor:pointer;">← Back to Tracker</button>'
                + '</div>';
        }

        if (!token) {
            showLoginPrompt('Login Required');
            return;
        }

        window.CONFIG = { WORKER_URL: '/api' };
        window.S = { currentUser: { access_token: token } };

        // ── UTILITIES ────────────────────────────────────────────────
        function esc(s) {
            if (!s) return '';
            return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
        }
        function validateIMO(imo) {
            if (!/^\d{7}$/.test(imo)) return false;
            var d = imo.split('').map(Number);
            return d[6] === d.slice(0,6).reduce(function(s,dd,i){ return s+dd*(7-i); },0) % 10;
        }
        async function api(url, options, timeout) {
            timeout = timeout || 8000;
            var ctrl = new AbortController();
            var id = setTimeout(function(){ ctrl.abort(); }, timeout);
            try {
                var r = await fetch(url, Object.assign({}, options, { signal: ctrl.signal }));
                clearTimeout(id);
                return r;
            } catch(e) { clearTimeout(id); throw e; }
        }
        function showToast(msg, type) {
            var container = document.getElementById('adminToasts');
            if (!container) return;
            var toast = document.createElement('div');
            var color = type === 'danger' ? 'var(--danger)' : type === 'success' ? 'var(--success)' : 'var(--text-main)';
            toast.style.cssText = 'background:var(--bg-card);border:1px solid '+color+';border-radius:8px;padding:8px 14px;margin:4px 0;font-size:.73rem;color:'+color+';box-shadow:0 2px 8px rgba(0,0,0,.3);';
            toast.textContent = msg;
            container.appendChild(toast);
            setTimeout(function(){ toast.remove(); }, 3500);
        }

        // ── STATE ────────────────────────────────────────────────────
        var allUsers = [];
        var allVessels = [];
        var allFailures = [];     // [{ imo, count, name, trackers }]
        var serverTime = null;    // ISO string sent by /admin/full-data
        var currentTab = 'fleet';

        // ── HELPERS ──────────────────────────────────────────────────
        // Vessels older than 6h are red, 1–6h yellow, fresh green.
        // Returns { cls, label, hoursAgo } or null when there's no timestamp.
        function staleness(updatedAtIso) {
            if (!updatedAtIso) return { cls: 'none', label: '—', hoursAgo: null };
            var now = serverTime ? new Date(serverTime).getTime() : Date.now();
            var t = new Date(updatedAtIso).getTime();
            if (isNaN(t)) return { cls: 'none', label: '—', hoursAgo: null };
            var h = (now - t) / 3600000;
            var cls = h > 6 ? 'stale' : h > 1 ? 'warn' : 'fresh';
            var label = h < 1
                ? Math.max(0, Math.round(h * 60)) + 'm ago'
                : h < 24 ? Math.round(h) + 'h ago'
                : Math.round(h / 24) + 'd ago';
            return { cls: cls, label: label, hoursAgo: h };
        }

        // ── API LOAD ─────────────────────────────────────────────────
        async function loadData() {
            showToast('Loading data…', 'info');
            try {
                var res = await api(
                    window.CONFIG.WORKER_URL + '/admin/full-data',
                    { headers: { Authorization: 'Bearer ' + token } },
                    15000
                );
                if (res.status === 401 || res.status === 403) {
                    // Token is invalid or user lost admin rights — clear and re-prompt
                    try {
                        sessionStorage.removeItem('vt_admin_token');
                        sessionStorage.removeItem('vt_admin_token_ts');
                    } catch(_) {}
                    showLoginPrompt(res.status === 403 ? 'Forbidden' : 'Session Expired');
                    return false;
                }
                if (!res.ok) throw new Error('HTTP ' + res.status);
                var data = await res.json();
                allUsers = data.users || [];
                allVessels = data.vessels || [];
                allFailures = data.failures || [];
                serverTime = data.server_time || null;
                showToast('Data loaded', 'success');
                return true;
            } catch(e) {
                showToast('Error: ' + e.message, 'danger');
                return false;
            }
        }

        // ── TAB SWITCHING ────────────────────────────────────────────
        async function switchTab(tabId) {
            currentTab = tabId;
            document.querySelectorAll('.admin-tab').forEach(function(b) {
                b.classList.toggle('active', b.getAttribute('data-id') === tabId);
            });
            document.getElementById('tabContent').innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-soft);">Loading…</div>';
            if (!allUsers.length) {
                var ok = await loadData();
                if (!ok) return;
            }
            renderTabContent();
        }

        function renderTabContent() {
            var cnt = document.getElementById('tabContent');
            if (currentTab === 'fleet') renderFleetTab(cnt);
            else if (currentTab === 'bulk') renderBulkTab(cnt);
            else if (currentTab === 'users') renderUsersTab(cnt);
        }

        // ── FLEET TAB ────────────────────────────────────────────────
        function renderFleetTab(cnt) {
            var totalVessels = allVessels.length;
            var trackingUsers = allVessels.reduce(function(acc, v) { return acc + (v.tracking_users ? v.tracking_users.length : 0); }, 0);
            var sanctionedCount = allVessels.filter(function(v){ return v.sanctioned; }).length;
            var staleCount      = allVessels.filter(function(v){ var s = staleness(v.updated_at); return s.cls === 'stale'; }).length;
            var failuresCount   = allFailures.length;

            // Stat row — five small KPIs
            var statsHtml = '<div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;">' +
                '<div style="flex:1;min-width:90px;background:var(--bg-elevated);border-radius:8px;padding:8px;text-align:center;">' +
                    '<div style="font-size:1.2rem;font-weight:700;">'+totalVessels+'</div><div style="font-size:.62rem;color:var(--text-soft);">Vessels</div></div>' +
                '<div style="flex:1;min-width:90px;background:var(--bg-elevated);border-radius:8px;padding:8px;text-align:center;">' +
                    '<div style="font-size:1.2rem;font-weight:700;">'+trackingUsers+'</div><div style="font-size:.62rem;color:var(--text-soft);">Trackings</div></div>' +
                '<div style="flex:1;min-width:90px;background:var(--bg-elevated);border-radius:8px;padding:8px;text-align:center;">' +
                    '<div style="font-size:1.2rem;font-weight:700;">'+allUsers.length+'</div><div style="font-size:.62rem;color:var(--text-soft);">Users</div></div>' +
                '<div style="flex:1;min-width:90px;background:var(--bg-elevated);border-radius:8px;padding:8px;text-align:center;'
                    +(sanctionedCount?'border:1px solid rgba(255,69,0,.4);':'')+'">' +
                    '<div style="font-size:1.2rem;font-weight:700;color:'+(sanctionedCount?'#ff6b35':'var(--text-main)')+';">'+sanctionedCount+'</div>' +
                    '<div style="font-size:.62rem;color:var(--text-soft);">🚨 Sanctioned</div></div>' +
                '<div style="flex:1;min-width:90px;background:var(--bg-elevated);border-radius:8px;padding:8px;text-align:center;'
                    +(staleCount?'border:1px solid rgba(239,68,68,.4);':'')+'">' +
                    '<div style="font-size:1.2rem;font-weight:700;color:'+(staleCount?'var(--danger)':'var(--text-main)')+';">'+staleCount+'</div>' +
                    '<div style="font-size:.62rem;color:var(--text-soft);">Stale &gt;6h</div></div>' +
                '<div style="flex:1;min-width:90px;background:var(--bg-elevated);border-radius:8px;padding:8px;text-align:center;'
                    +(failuresCount?'border:1px solid rgba(239,68,68,.4);':'')+'">' +
                    '<div style="font-size:1.2rem;font-weight:700;color:'+(failuresCount?'var(--danger)':'var(--text-main)')+';">'+failuresCount+'</div>' +
                    '<div style="font-size:.62rem;color:var(--text-soft);">Scrape Fails</div></div>' +
                '</div>';

            // Failure card — only shown if there are any flapping IMOs
            var failuresHtml = '';
            if (allFailures.length) {
                var rowsHtml = allFailures.slice(0, 25).map(function(f){
                    var trackerStr = (f.trackers && f.trackers.length) ? f.trackers.map(esc).join(', ') : '<em style="color:var(--text-soft);opacity:.7;">untracked</em>';
                    return '<div class="failures-row">' +
                        '<span class="imo">'+esc(f.imo)+'</span>' +
                        '<span class="name">'+esc(f.name)+'</span>' +
                        '<span class="cnt" title="Consecutive scrape failures">'+f.count+' fail'+(f.count===1?'':'s')+'</span>' +
                        '<span style="color:var(--text-soft);font-size:.68rem;max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+trackerStr+'</span>' +
                        '</div>';
                }).join('');
                var moreHtml = allFailures.length > 25
                    ? '<div style="margin-top:6px;font-size:.68rem;color:var(--text-soft);">+ '+(allFailures.length - 25)+' more…</div>' : '';
                failuresHtml = '<div class="failures-card">' +
                    '<div class="title">⚠️ Scraper failures (' + allFailures.length + ')</div>' +
                    rowsHtml + moreHtml +
                    '</div>';
            }

            // Vessel table — sanction badge + freshness dot + tooltip
            var tableHtml = '<div style="overflow-x:auto;">' +
                '<table class="admin-table"><thead><tr>' +
                    '<th><input type="checkbox" id="fleetCheckAll" title="Select all"></th>' +
                    '<th>IMO</th><th>Vessel</th><th>Flag</th><th>Status</th>' +
                    '<th>Last AIS</th><th>Tracked by</th><th></th>' +
                '</tr></thead><tbody>' +
                allVessels.map(function(v) {
                    var s = staleness(v.updated_at);
                    var sancBadge = v.sanctioned
                        ? '<span class="sanc-badge" title="'+esc((v.sanction_lists||[]).join(' · '))+'">🚨 SANC</span>'
                        : '';
                    var usersStr = (v.tracking_users || []).map(function(u){ return esc(u.username); }).join(', ') || '<em style="color:var(--text-soft);opacity:.7;">—</em>';
                    return '<tr'+(v.sanctioned?' style="background:rgba(255,69,0,.04);"':'')+'>' +
                        '<td><input type="checkbox" class="fleet-check" data-imo="'+v.imo+'"></td>' +
                        '<td>'+esc(v.imo)+'</td>' +
                        '<td>'+esc(v.name || 'IMO '+v.imo)+sancBadge+'</td>' +
                        '<td>'+esc(v.flag || '—')+'</td>' +
                        '<td>'+(v.status || 'PENDING')+'</td>' +
                        '<td><span class="stale-dot '+s.cls+'" title="Last AIS update"></span>'+esc(s.label)+'</td>' +
                        '<td>'+usersStr+'</td>' +
                        '<td><button onclick="window._removeGlobal(\''+v.imo+'\')" class="action-btn danger" title="Remove from ALL trackers">✕</button></td>' +
                    '</tr>';
                }).join('') +
                '</tbody></table></div>' +
                '<div style="margin-top:10px;"><button onclick="window._bulkRemove()" class="action-btn danger">🗑 Remove Selected</button></div>';

            cnt.innerHTML = statsHtml + failuresHtml + tableHtml;

            // Wire up "select all" checkbox
            var checkAll = document.getElementById('fleetCheckAll');
            if (checkAll) {
                checkAll.onclick = function() {
                    document.querySelectorAll('.fleet-check').forEach(function(c){ c.checked = checkAll.checked; });
                };
            }

            window._removeGlobal = async function(imo) {
                if (!confirm('Remove IMO ' + imo + ' from ALL users?')) return;
                try {
                    var res = await api(window.CONFIG.WORKER_URL + '/admin/fleet/bulk-remove', {
                        method: 'POST', headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
                        body: JSON.stringify({ admin_token: token, imos: [imo] })
                    });
                    if (!res.ok) throw new Error('Failed');
                    showToast('IMO ' + imo + ' removed', 'success');
                    await loadData();
                    switchTab('fleet');
                } catch(e) { showToast('Error: ' + e.message, 'danger'); }
            };
            window._bulkRemove = async function() {
                var checks = document.querySelectorAll('.fleet-check:checked');
                var imos = Array.from(checks).map(function(c){ return c.dataset.imo; });
                if (!imos.length) return;
                if (!confirm('Remove ' + imos.length + ' vessel(s) from ALL users?')) return;
                try {
                    var res = await api(window.CONFIG.WORKER_URL + '/admin/fleet/bulk-remove', {
                        method: 'POST', headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
                        body: JSON.stringify({ admin_token: token, imos: imos })
                    }, 20000);
                    if (!res.ok) throw new Error('Failed');
                    showToast(imos.length + ' vessel(s) removed', 'success');
                    await loadData();
                    switchTab('fleet');
                } catch(e) { showToast('Error: ' + e.message, 'danger'); }
            };
        }

        // ── BULK ADD TAB ─────────────────────────────────────────────
        function renderBulkTab(cnt) {
            var opts = allUsers.map(function(u){ return '<option value="'+u.id+'">'+esc(u.username)+'</option>'; }).join('');
            cnt.innerHTML = '<h3>Add Vessels to a User in Bulk</h3>' +
                '<div style="background:var(--bg-elevated);border-radius:8px;padding:12px;">' +
                '<label style="font-size:.73rem;">Select user:</label>' +
                '<select id="bulkUser" style="width:100%;margin-bottom:10px;">'+opts+'</select>' +
                '<label style="font-size:.73rem;">Paste IMOs (one per line, or comma-separated):</label>' +
                '<textarea id="bulkImo" rows="5" placeholder="IMO1, IMO2, …"></textarea>' +
                '<button onclick="window._bulkAdd()" class="btn btn-primary" style="margin-top:10px;">Add Vessels</button>' +
                '<div id="bulkResult" style="margin-top:8px;font-size:.75rem;"></div></div>';

            window._bulkAdd = async function() {
                var userId = document.getElementById('bulkUser').value;
                var raw = document.getElementById('bulkImo').value;
                var imos = raw.split(/[,\n\s]+/).map(function(s){ return s.trim(); }).filter(function(s){ return /^\d{7}$/.test(s); });
                if (!imos.length) return showToast('No valid IMOs found.', 'warning');
                var invalid = imos.filter(function(i){ return !validateIMO(i); });
                if (invalid.length) { showToast(invalid.length + ' IMO(s) fail checksum: ' + invalid.join(', '), 'danger'); return; }
                document.getElementById('bulkResult').innerText = 'Sending…';
                try {
                    var res = await api(window.CONFIG.WORKER_URL + '/admin/fleet/bulk-add', {
                        method: 'POST', headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
                        body: JSON.stringify({ admin_token: token, user_id: userId, imos: imos })
                    }, 30000);
                    var data = await res.json();
                    if (!res.ok) throw new Error(data.error || 'Request failed');
                    document.getElementById('bulkImo').value = '';
                    document.getElementById('bulkResult').innerHTML = '✅ ' + (data.added||0) + ' added, ' + (data.skipped||0) + ' skipped.';
                    showToast('Bulk add complete', 'success');
                } catch(e) {
                    document.getElementById('bulkResult').innerHTML = '<span style="color:var(--danger);">Error: '+esc(e.message)+'</span>';
                    showToast('Bulk add failed', 'danger');
                }
            };
        }

        // ── USERS TAB ────────────────────────────────────────────────
        function renderUsersTab(cnt) {
            cnt.innerHTML = '<button onclick="window._addUserModal()" class="btn btn-primary" style="margin-bottom:12px;">+ Add New User</button>' +
                '<div style="overflow-x:auto;"><table class="admin-table"><thead><tr><th>Username</th><th>Fleet</th><th>CallMeBot</th><th>Status</th><th>Actions</th></tr></thead>' +
                '<tbody>' + allUsers.map(function(u) {
                    var badge = u.is_frozen ? '<span class="badge" style="background:rgba(239,68,68,.2);color:var(--danger);">Frozen</span>' :
                        (!u.can_add_vessels ? '<span class="badge" style="background:rgba(245,158,11,.2);color:var(--warning);">Ban Add</span>' : '<span class="badge" style="background:rgba(34,197,94,.2);color:var(--success);">Active</span>');
                    return '<tr>' +
                        '<td>'+esc(u.username)+'</td>' +
                        '<td>'+(u.vessels ? u.vessels.length : 0)+'</td>' +
                        '<td>'+(u.callmebot_enabled ? 'ON' : 'OFF')+'</td>' +
                        '<td>'+badge+'</td>' +
                        '<td>' +
                            '<button onclick="window._toggleFreeze(\''+u.id+'\','+!!u.is_frozen+')" class="action-btn '+(u.is_frozen?'success':'danger')+'">'+(u.is_frozen?'Unfreeze':'Freeze')+'</button> ' +
                            '<button onclick="window._toggleBan(\''+u.id+'\','+!!u.can_add_vessels+')" class="action-btn '+(u.can_add_vessels?'danger':'success')+'">'+(u.can_add_vessels?'Ban':'Allow')+'</button> ' +
                            '<button onclick="window._editUser(\''+u.id+'\')" class="action-btn">✏️</button> ' +
                            '<button onclick="window._deleteUser(\''+u.id+'\')" class="action-btn danger">🗑</button>' +
                        '</td></tr>';
                }).join('') + '</tbody></table></div>';

            window._toggleFreeze = async function(uid, current) {
                if (!confirm((current?'Unfreeze':'Freeze')+' this user?')) return;
                try {
                    var res = await api(window.CONFIG.WORKER_URL + '/admin/user/status', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
                        body: JSON.stringify({ admin_token: token, user_id: uid, is_frozen: !current })
                    });
                    if (!res.ok) throw new Error('Failed');
                    showToast('Status updated', 'success');
                    await loadData(); switchTab('users');
                } catch(e) { showToast(e.message, 'danger'); }
            };
            window._toggleBan = async function(uid, current) {
                if (!confirm((current?'Ban':'Allow')+' adding vessels?')) return;
                try {
                    var res = await api(window.CONFIG.WORKER_URL + '/admin/user/status', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
                        body: JSON.stringify({ admin_token: token, user_id: uid, can_add_vessels: !current })
                    });
                    if (!res.ok) throw new Error('Failed');
                    showToast('Status updated', 'success');
                    await loadData(); switchTab('users');
                } catch(e) { showToast(e.message, 'danger'); }
            };
            window._editUser = function(uid) {
                var u = allUsers.find(function(x){ return x.id === uid; });
                if (!u) return;
                var m = document.getElementById('userEditModal');
                if (m) m.remove();
                document.body.insertAdjacentHTML('beforeend',
                    '<div class="modal" id="userEditModal"><div class="modal-inner">' +
                    '<h3>Edit '+esc(u.username)+'</h3>' +
                    '<label>Phone</label><input id="euPhone" value="'+esc(u.callmebot_phone||'')+'">' +
                    '<label>API Key</label><input id="euApikey" value="'+esc(u.callmebot_apikey||'')+'">' +
                    '<label>CallMeBot</label><select id="euCm"><option value="true" '+(u.callmebot_enabled?'selected':'')+'>ON</option><option value="false" '+(!u.callmebot_enabled?'selected':'')+'>OFF</option></select>' +
                    '<label>New PIN (optional)</label><input id="euPin" type="number" min="1000" max="999999">' +
                    '<div style="margin-top:12px;display:flex;gap:8px;">' +
                    '<button onclick="window._saveEdit(\''+uid+'\')" class="btn btn-primary">Save</button>' +
                    '<button onclick="document.getElementById(\'userEditModal\').remove()" class="btn btn-secondary">Cancel</button>' +
                    '</div></div></div>');
            };
            window._saveEdit = async function(uid) {
                var phone = document.getElementById('euPhone').value.trim();
                var apikey = document.getElementById('euApikey').value.trim();
                var cm = document.getElementById('euCm').value === 'true';
                var pin = document.getElementById('euPin').value.trim();
                try {
                    var res = await api(window.CONFIG.WORKER_URL + '/admin/user/update', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
                        body: JSON.stringify({ admin_token: token, user_id: uid, callmebot_phone: phone, callmebot_apikey: apikey, callmebot_enabled: cm })
                    });
                    if (!res.ok) throw new Error('Settings update failed');
                    if (pin && /^\d{4,6}$/.test(pin)) {
                        res = await api(window.CONFIG.WORKER_URL + '/admin/user/pin', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
                            body: JSON.stringify({ admin_token: token, user_id: uid, new_pin: pin })
                        });
                        if (!res.ok) throw new Error('PIN reset failed');
                    }
                    var m = document.getElementById('userEditModal'); if (m) m.remove();
                    showToast('User updated', 'success');
                    await loadData(); switchTab('users');
                } catch(e) { showToast(e.message, 'danger'); }
            };
            window._deleteUser = async function(uid) {
                var u = allUsers.find(function(x){ return x.id === uid; });
                if (!u) return;
                var typed = prompt('This will DELETE user "' + u.username + '" and all their tracked vessels. This cannot be undone.\n\nType the username to confirm:');
                if (typed === null) return;          // cancelled
                if (typed.trim() !== u.username) {
                    showToast('Username did not match — deletion cancelled.', 'warning');
                    return;
                }
                try {
                    var res = await api(window.CONFIG.WORKER_URL + '/admin/user/delete', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
                        body: JSON.stringify({ admin_token: token, user_id: uid })
                    });
                    if (!res.ok) {
                        var err = await res.json().catch(function(){ return {}; });
                        throw new Error(err.error || 'Failed');
                    }
                    showToast('User deleted', 'success');
                    await loadData(); switchTab('users');
                } catch(e) { showToast(e.message, 'danger'); }
            };
            window._addUserModal = function() {
                var m = document.getElementById('addUserModal'); if (m) m.remove();
                document.body.insertAdjacentHTML('beforeend',
                    '<div class="modal" id="addUserModal"><div class="modal-inner"><h3>New User</h3>' +
                    '<input id="nuName" placeholder="Username"><br>' +
                    '<input id="nuPin" type="number" placeholder="PIN (4-6 digits)" min="1000" max="999999"><br>' +
                    '<div style="margin-top:12px;display:flex;gap:8px;">' +
                    '<button onclick="window._createUser()" class="btn btn-primary">Create</button>' +
                    '<button onclick="document.getElementById(\'addUserModal\').remove()" class="btn btn-secondary">Cancel</button>' +
                    '</div></div></div>');
            };
            window._createUser = async function() {
                var name = document.getElementById('nuName').value.trim();
                var pin = document.getElementById('nuPin').value.trim();
                if (!name || !/^\d{4,6}$/.test(pin)) { showToast('Invalid username or PIN', 'warning'); return; }
                try {
                    var res = await api(window.CONFIG.WORKER_URL + '/admin/user/create', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
                        body: JSON.stringify({ admin_token: token, username: name, pin: pin })
                    });
                    if (!res.ok) { var e = await res.json(); throw new Error(e.error||'Creation failed'); }
                    var m = document.getElementById('addUserModal'); if (m) m.remove();
                    showToast('User created', 'success');
                    await loadData(); switchTab('users');
                } catch(e) { showToast(e.message, 'danger'); }
            };
        }

        // ── INIT ─────────────────────────────────────────────────────
        mainEl.innerHTML = '<div class="admin-tabs" id="tabs"></div><div id="tabContent"><div style="padding:20px;text-align:center;color:var(--text-soft);">Loading…</div></div>';

        var tabDefs = [
            { id:'fleet', label:'🚢 Fleet Manager' },
            { id:'bulk', label:'📥 Bulk Add' },
            { id:'users', label:'👥 User Manager' }
        ];
        var tabsEl = document.getElementById('tabs');
        tabDefs.forEach(function(t) {
            var b = document.createElement('button');
            b.className = 'admin-tab';
            b.setAttribute('data-id', t.id);
            b.textContent = t.label;
            b.onclick = function(){ switchTab(t.id); };
            tabsEl.appendChild(b);
        });

        loadData().then(function(ok){ if (ok) switchTab('fleet'); });
    })();
    </script>
</body>
</html>
