<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Allow pinch-zoom for accessibility (WCAG 2.1) — removed maximum-scale=1.0 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <!--
      Content Security Policy — locks down what scripts, styles, and network
      requests this page can do. With zero inline event handlers in our markup
      we could go stricter, but the page itself ships ONE inline JS block so
      'unsafe-inline' is still required for script-src. If you ever externalise
      that block into admin.js, drop 'unsafe-inline' from script-src and add
      a hash or nonce instead.
    -->
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'none';
        script-src 'self' 'unsafe-inline';
        style-src 'self' 'unsafe-inline';
        connect-src 'self';
        img-src 'self' data:;
        font-src 'self';
        base-uri 'none';
        form-action 'none';
        frame-ancestors 'none';
        object-src 'none';
    ">
    <meta name="referrer" content="no-referrer">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <title>VesselTracker Admin</title>
    <style>
        :root {
            --bg-main: #020c1a;
            --bg-card: #0a1628;
            --bg-elevated: #111d32;
            --text-main: #e2e8f0;
            --text-soft: #94a3b8;
            --accent: #0ea5e9;
            --accent-soft: rgba(14,165,233,.15);
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
            --border: rgba(148,163,184,.15);
            --sans: system-ui, -apple-system, sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { -webkit-text-size-adjust: 100%; }
        body {
            background: var(--bg-main);
            color: var(--text-main);
            font-family: var(--sans);
            line-height: 1.5;
            min-height: 100vh;
            /* Respect iOS safe area on notched phones */
            padding-bottom: env(safe-area-inset-bottom);
        }
        .admin-tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
        .admin-tab {
            padding: 10px 16px; border-radius: 8px; cursor: pointer;
            background: var(--bg-card); color: var(--text-soft);
            border: 1px solid var(--border); transition: all .15s;
            font-size: .8rem; font-weight: 500; flex: 1 1 auto;
            min-height: 44px; /* touch-target */
            display: inline-flex; align-items: center; justify-content: center;
        }
        .admin-tab:hover { background: var(--bg-elevated); color: var(--text-main); }
        .admin-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
        .admin-table { width: 100%; border-collapse: collapse; font-size: .8rem; }
        .admin-table th {
            text-align: left; padding: 10px 8px;
            border-bottom: 2px solid var(--border); color: var(--text-soft); font-weight: 600;
        }
        .admin-table td { padding: 10px 8px; border-bottom: 1px solid var(--border); vertical-align: middle; }
        .admin-table input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--accent); cursor: pointer; }
        .badge { display: inline-block; padding: 2px 7px; border-radius: 10px; font-size: .65rem; }
        .action-btn {
            background: none; border: 1px solid var(--border); border-radius: 4px;
            color: var(--text-soft); cursor: pointer; padding: 8px 12px;
            font-size: .75rem; margin: 2px; min-height: 36px; min-width: 36px;
            transition: all .15s;
        }
        .action-btn:hover { opacity: .8; }
        .action-btn.danger { color: var(--danger); border-color: var(--danger); }
        .action-btn.success { color: var(--success); border-color: var(--success); }
        .btn {
            display: inline-block; padding: 12px 22px; border-radius: 6px;
            border: none; cursor: pointer; font-size: .85rem; font-weight: 500;
            min-height: 44px; transition: opacity .15s;
        }
        .btn:hover { opacity: .85; }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-secondary { background: var(--bg-elevated); color: var(--text-main); }
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,.6); display: flex; align-items: center; justify-content: center;
            z-index: 9999; padding: 12px;
            animation: modal-fade-in .12s ease-out;
        }
        @keyframes modal-fade-in { from { opacity: 0; } to { opacity: 1; } }
        .modal-inner {
            background: var(--bg-card); padding: 20px; border-radius: 12px;
            max-width: 500px; width: 100%; color: var(--text-main);
            max-height: calc(100vh - 24px); overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .modal-inner h3 { margin: 0 0 12px; font-size: .95rem; }
        .modal-inner label { display: block; font-size: .75rem; color: var(--text-soft); margin: 10px 0 4px; }
        .modal-inner input, .modal-inner select, .modal-inner textarea {
            width: 100%; background: var(--bg-elevated); border: 1px solid var(--border);
            border-radius: 6px; padding: 10px; color: var(--text-main); font-size: .85rem;
            min-height: 44px; /* touch target */
            font-family: inherit;
        }
        .modal-inner textarea { min-height: 88px; resize: vertical; }
        .modal-inner input:focus, .modal-inner select:focus, .modal-inner textarea:focus {
            outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft);
        }
        .login-prompt {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 60vh; text-align: center; gap: 1rem; padding: 16px;
        }
        select, textarea {
            background: var(--bg-elevated); border: 1px solid var(--border);
            border-radius: 6px; padding: 10px; color: var(--text-main); font-size: .85rem;
            font-family: inherit;
        }
        textarea { width: 100%; resize: vertical; }
        /* Visual cues for the Fleet tab */
        .sanc-badge {
            display: inline-block; padding: 1px 6px; border-radius: 8px;
            font-size: .6rem; font-weight: 700; letter-spacing: .03em;
            background: rgba(255,69,0,.15); color: #ff6b35; border: 1px solid rgba(255,69,0,.4);
            margin-left: 6px; vertical-align: middle;
        }
        .stale-dot {
            display: inline-block; width: 8px; height: 8px; border-radius: 50%;
            margin-right: 6px; vertical-align: middle;
        }
        .stale-dot.fresh { background: var(--success); }
        .stale-dot.warn  { background: var(--warning); }
        .stale-dot.stale { background: var(--danger); }
        .stale-dot.none  { background: var(--text-soft); opacity: .4; }
        .failures-card {
            background: var(--bg-elevated); border: 1px solid rgba(239,68,68,.25);
            border-radius: 8px; padding: 10px 12px; margin-bottom: 14px;
        }
        .failures-card .title {
            font-weight: 700; font-size: .8rem; color: var(--danger); margin-bottom: 6px;
        }
        .failures-row {
            display: flex; align-items: center; gap: 10px;
            padding: 5px 0; border-bottom: 1px solid var(--border); font-size: .73rem;
        }
        .failures-row:last-child { border-bottom: none; }
        .failures-row .imo  { font-weight: 600; color: var(--text-main); min-width: 70px; }
        .failures-row .name { flex: 1; color: var(--text-soft); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .failures-row .cnt  { color: var(--danger); font-weight: 600; }
        /* Handoff tab */
        .handoff-pill {
            display: inline-block; padding: 2px 8px; border-radius: 10px;
            font-size: .65rem; font-weight: 600; letter-spacing: .02em;
        }
        .handoff-pill.pending  { background: rgba(245,158,11,.18); color: var(--warning); border: 1px solid rgba(245,158,11,.4); }
        .handoff-pill.accepted { background: rgba(16,185,129,.18); color: var(--success); border: 1px solid rgba(16,185,129,.4); }
        .handoff-pill.declined { background: rgba(239,68,68,.18);  color: var(--danger);  border: 1px solid rgba(239,68,68,.4); }
        .handoff-type {
            display: inline-block; padding: 1px 7px; border-radius: 4px;
            font-size: .62rem; font-weight: 700; letter-spacing: .04em;
            background: var(--bg-elevated); border: 1px solid var(--border); color: var(--text-soft);
        }
        .handoff-type.sof     { color: #38bdf8; border-color: rgba(56,189,248,.4); }
        .handoff-type.dossier { color: #c084fc; border-color: rgba(192,132,252,.4); }
        .filter-chip {
            display: inline-block; padding: 4px 10px; border-radius: 16px;
            border: 1px solid var(--border); background: var(--bg-elevated);
            color: var(--text-soft); font-size: .7rem; cursor: pointer;
            margin-right: 6px; margin-bottom: 6px; transition: all .12s;
        }
        .filter-chip:hover  { border-color: var(--accent); }
        .filter-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
        .handoff-detail {
            background: var(--bg-elevated); border: 1px solid var(--border);
            border-radius: 8px; padding: 12px;
            font-size: .73rem; color: var(--text-main);
            max-height: 60vh; overflow-y: auto;
        }
        .handoff-detail .kv { display: flex; gap: 10px; padding: 4px 0; border-bottom: 1px solid var(--border); }
        .handoff-detail .kv:last-child { border-bottom: none; }
        .handoff-detail .kv .k { font-weight: 600; color: var(--text-soft); min-width: 130px; }
        .handoff-detail .kv .v { flex: 1; word-break: break-word; }
        .handoff-detail pre {
            background: var(--bg-card); border-radius: 4px; padding: 6px 8px;
            font-size: .68rem; overflow-x: auto; color: var(--text-soft);
            white-space: pre-wrap; max-height: 200px; overflow-y: auto;
        }
        .handoff-detail .ops-table {
            width: 100%; border-collapse: collapse; margin-top: 4px; font-size: .68rem;
        }
        .handoff-detail .ops-table th, .handoff-detail .ops-table td {
            padding: 3px 6px; border: 1px solid var(--border); text-align: left;
        }
        .handoff-detail .ops-table th { background: var(--bg-card); color: var(--text-soft); }
        /* ─── Mobile responsive (≤640px) ──────────────────────────── */
        @media (max-width: 640px) {
            #mainContent { padding: 8px !important; }
            .admin-tabs { gap: 4px; margin-bottom: 12px; }
            .admin-tab {
                padding: 8px 10px; font-size: .72rem;
                /* Each tab gets exactly half the row */
                flex: 1 1 calc(50% - 4px); min-width: 0;
                white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            }
            .admin-table { font-size: .7rem; }
            .admin-table th, .admin-table td { padding: 7px 4px; }
            .admin-table th { font-size: .6rem; letter-spacing: .03em; }
            /* Stat boxes — 3-up on phones, not 6-up */
            .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
            .stat-grid .stat-box { min-width: 0 !important; padding: 8px 4px !important; }
            .stat-grid .stat-box > div:first-child { font-size: 1rem !important; }
            .stat-grid .stat-box > div:last-child { font-size: .55rem !important; }
            /* Modals fill the screen edge-to-edge */
            .modal { padding: 6px; align-items: flex-end; }
            .modal-inner {
                max-width: 100%; max-height: 92vh;
                border-radius: 16px 16px 0 0;
                animation: modal-slide-up .18s ease-out;
            }
            @keyframes modal-slide-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
            .modal-inner h3 { font-size: 1rem; }
            /* Chip filters — wider tap zone */
            .filter-chip { padding: 8px 14px; font-size: .73rem; }
            /* Action buttons inside tables — stack vertically when many */
            .admin-table td .action-btn { padding: 6px 8px; font-size: .68rem; margin: 2px; }
            /* Hide non-essential columns on narrow screens */
            .hide-mobile { display: none !important; }
            /* Header */
            .admin-header { flex-direction: column; align-items: stretch !important; gap: 8px; }
            .admin-header .header-label { display: none; } /* "Admin Dashboard" text hides */
            /* Failures rows wrap better */
            .failures-row { flex-wrap: wrap; }
            .failures-row .name { min-width: 0; flex-basis: 100%; order: 3; padding-left: 78px; }
            /* Bigger handoff detail */
            .handoff-detail { font-size: .8rem; }
            .handoff-detail .kv .k { min-width: 100px; }
        }
        /* ─── Tablet (641–960px) — slightly relaxed ──────────────── */
        @media (min-width: 641px) and (max-width: 960px) {
            .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="admin-header" style="padding:12px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);gap:8px;">
            <h1 style="margin:0;font-size:1.1rem;">⚙️ Admin Dashboard</h1>
            <button id="backToTracker" class="action-btn">← Back to Tracker</button>
        </div>
        <div style="padding:16px;" id="mainContent">
            <div style="padding:40px;text-align:center;color:var(--text-soft);">Initialising…</div>
        </div>
        <div id="adminToasts" style="position:fixed;bottom:12px;right:12px;z-index:9999;max-width:90vw;"></div>
    </div>

    <script>
    (function() {
        // Wire the back button (no inline onclick → safer with strict CSP)
        var backBtn = document.getElementById('backToTracker');
        if (backBtn) backBtn.addEventListener('click', function(){ window.location.href = '../'; });

        // ── CONFIG & GLOBALS ─────────────────────────────────────────
        // Token is handed off via sessionStorage by admin.js (NOT in URL —
        // URL params leak in browser history, server logs, and Referer headers).
        // Backwards-compat: still accept ?token=… so existing bookmarks work,
        // but immediately migrate it into sessionStorage and strip from URL.
        var token = null;
        try {
            var urlParams = new URLSearchParams(window.location.search);
            var legacyToken = urlParams.get('token');
            if (legacyToken) {
                sessionStorage.setItem('vt_admin_token', legacyToken);
                sessionStorage.setItem('vt_admin_token_ts', String(Date.now()));
                // Strip token from the URL bar so it doesn't get bookmarked/shared
                history.replaceState(null, '', window.location.pathname);
            }
            token = sessionStorage.getItem('vt_admin_token');
            // Token expires after 1 hour of inactivity in this tab
            var ts = parseInt(sessionStorage.getItem('vt_admin_token_ts') || '0', 10);
            if (token && ts && Date.now() - ts > 60 * 60 * 1000) {
                sessionStorage.removeItem('vt_admin_token');
                sessionStorage.removeItem('vt_admin_token_ts');
                token = null;
            }
        } catch(e) { console.error('sessionStorage error:', e); }

        var mainEl = document.getElementById('mainContent');

        function showLoginPrompt(reason) {
            // Even though `reason` only takes hardcoded values today, escaping
            // it here is a cheap safety net for future callers.
            mainEl.innerHTML = '<div class="login-prompt">'
                + '<div style="font-size:2rem;">🔐</div>'
                + '<h2>' + escSafe(reason || 'Login Required') + '</h2>'
                + '<p style="color:var(--text-soft);max-width:300px;">Please return to the main app and re-open the dashboard from the admin panel.</p>'
                + '<button id="loginBackBtn" style="padding:12px 24px;font-size:.9rem;border-radius:8px;background:var(--accent);color:#fff;border:none;cursor:pointer;min-height:44px;">← Back to Tracker</button>'
                + '</div>';
            var b = document.getElementById('loginBackBtn');
            if (b) b.addEventListener('click', function(){ window.location.href = '../'; });
        }
        // Tiny escape used before `esc()` is defined further down. Inlined to
        // avoid a forward-reference issue.
        function escSafe(s) {
            if (!s) return '';
            return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
        }

        if (!token) {
            showLoginPrompt('Login Required');
            return;
        }

        window.CONFIG = { WORKER_URL: '/api' };
        window.S = { currentUser: { access_token: token } };

        // ── UTILITIES ────────────────────────────────────────────────
        function esc(s) {
            if (!s) return '';
            return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
        }
        function validateIMO(imo) {
            if (!/^\d{7}$/.test(imo)) return false;
            var d = imo.split('').map(Number);
            return d[6] === d.slice(0,6).reduce(function(s,dd,i){ return s+dd*(7-i); },0) % 10;
        }
        async function api(url, options, timeout) {
            timeout = timeout || 8000;
            var ctrl = new AbortController();
            var id = setTimeout(function(){ ctrl.abort(); }, timeout);
            try {
                var r = await fetch(url, Object.assign({}, options, { signal: ctrl.signal }));
                clearTimeout(id);
                return r;
            } catch(e) { clearTimeout(id); throw e; }
        }
        function showToast(msg, type) {
            var container = document.getElementById('adminToasts');
            if (!container) return;
            var toast = document.createElement('div');
            var color = type === 'danger' ? 'var(--danger)' : type === 'success' ? 'var(--success)' : 'var(--text-main)';
            toast.style.cssText = 'background:var(--bg-card);border:1px solid '+color+';border-radius:8px;padding:10px 14px;margin:4px 0;font-size:.8rem;color:'+color+';box-shadow:0 2px 8px rgba(0,0,0,.3);max-width:90vw;';
            // textContent (NOT innerHTML) so any user-controlled string in `msg`
            // is rendered as text, not HTML — bulletproof against XSS in toasts.
            toast.textContent = msg;
            container.appendChild(toast);
            setTimeout(function(){ toast.remove(); }, 3500);
        }

        // ── MODAL HELPERS ────────────────────────────────────────────
        // Wires ESC-to-close and backdrop-click-to-close on every modal we
        // insert. Centralised so we only have to think about it once.
        function wireModalClose(modalId) {
            var m = document.getElementById(modalId);
            if (!m) return;
            // Click on backdrop (the .modal element itself, not inner) closes
            m.addEventListener('click', function(ev) {
                if (ev.target === m) m.remove();
            });
            // ESC closes whichever modal is topmost
            var escHandler = function(ev) {
                if (ev.key === 'Escape') {
                    var still = document.getElementById(modalId);
                    if (still) {
                        still.remove();
                        document.removeEventListener('keydown', escHandler);
                    }
                }
            };
            document.addEventListener('keydown', escHandler);
            // If something else removes the modal, drop our listener too
            var observer = new MutationObserver(function() {
                if (!document.getElementById(modalId)) {
                    document.removeEventListener('keydown', escHandler);
                    observer.disconnect();
                }
            });
            observer.observe(document.body, { childList: true, subtree: false });
        }

        // ── STATE ────────────────────────────────────────────────────
        var allUsers = [];
        var allVessels = [];
        var allFailures = [];     // [{ imo, count, name, trackers }]
        var allHandoffs = [];     // [{ id, type, from_username, to_username, imo, vessel_name, status, created_at, responded_at, notes, ... }]
        var handoffStats = null;  // { total, sof, dossier, pending, accepted, declined }
        var handoffFilter = 'all'; // 'all' | 'sof' | 'dossier' | 'pending' | 'accepted' | 'declined'
        var serverTime = null;    // ISO string sent by /admin/full-data
        var currentTab = 'fleet';

        // ── HELPERS ──────────────────────────────────────────────────
        // Vessels older than 6h are red, 1–6h yellow, fresh green.
        // Returns { cls, label, hoursAgo } or null when there's no timestamp.
        function staleness(updatedAtIso) {
            if (!updatedAtIso) return { cls: 'none', label: '—', hoursAgo: null };
            var now = serverTime ? new Date(serverTime).getTime() : Date.now();
            var t = new Date(updatedAtIso).getTime();
            if (isNaN(t)) return { cls: 'none', label: '—', hoursAgo: null };
            var h = (now - t) / 3600000;
            var cls = h > 6 ? 'stale' : h > 1 ? 'warn' : 'fresh';
            var label = h < 1
                ? Math.max(0, Math.round(h * 60)) + 'm ago'
                : h < 24 ? Math.round(h) + 'h ago'
                : Math.round(h / 24) + 'd ago';
            return { cls: cls, label: label, hoursAgo: h };
        }

        // Plain relative timestamp — "3h ago", "2d ago", "never". Used for
        // last-login and handoff dates where we don't want a coloured dot.
        function formatRelative(iso) {
            if (!iso) return 'never';
            var t = new Date(iso).getTime();
            if (isNaN(t)) return '—';
            var now = serverTime ? new Date(serverTime).getTime() : Date.now();
            var diff = (now - t) / 1000;
            if (diff < 60)         return Math.max(1, Math.round(diff)) + 's ago';
            if (diff < 3600)       return Math.round(diff / 60) + 'm ago';
            if (diff < 86400)      return Math.round(diff / 3600) + 'h ago';
            if (diff < 86400 * 30) return Math.round(diff / 86400) + 'd ago';
            return new Date(iso).toLocaleDateString('en-GB', { year: 'numeric', month: 'short', day: '2-digit' });
        }

        function formatAbsolute(iso) {
            if (!iso) return '—';
            var d = new Date(iso); if (isNaN(d.getTime())) return '—';
            return d.toLocaleString('en-GB', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
        }

        // ── API LOAD ─────────────────────────────────────────────────
        async function loadData() {
            showToast('Loading data…', 'info');
            try {
                var res = await api(
                    window.CONFIG.WORKER_URL + '/admin/full-data',
                    { headers: { Authorization: 'Bearer ' + token } },
                    15000
                );
                if (res.status === 401 || res.status === 403) {
                    // Token is invalid or user lost admin rights — clear and re-prompt
                    try {
                        sessionStorage.removeItem('vt_admin_token');
                        sessionStorage.removeItem('vt_admin_token_ts');
                    } catch(_) {}
                    showLoginPrompt(res.status === 403 ? 'Forbidden' : 'Session Expired');
                    return false;
                }
                if (!res.ok) throw new Error('HTTP ' + res.status);
                var data = await res.json();
                allUsers = data.users || [];
                allVessels = data.vessels || [];
                allFailures = data.failures || [];
                serverTime = data.server_time || null;
                showToast('Data loaded', 'success');
                return true;
            } catch(e) {
                showToast('Error: ' + e.message, 'danger');
                return false;
            }
        }

        // ── TAB SWITCHING ────────────────────────────────────────────
        async function switchTab(tabId) {
            currentTab = tabId;
            document.querySelectorAll('.admin-tab').forEach(function(b) {
                b.classList.toggle('active', b.getAttribute('data-id') === tabId);
            });
            document.getElementById('tabContent').innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-soft);">Loading…</div>';
            if (!allUsers.length) {
                var ok = await loadData();
                if (!ok) return;
            }
            renderTabContent();
        }

        function renderTabContent() {
            var cnt = document.getElementById('tabContent');
            if (currentTab === 'fleet') renderFleetTab(cnt);
            else if (currentTab === 'bulk') renderBulkTab(cnt);
            else if (currentTab === 'users') renderUsersTab(cnt);
            else if (currentTab === 'handoffs') renderHandoffsTab(cnt);
        }

        // ── FLEET TAB ────────────────────────────────────────────────
        function renderFleetTab(cnt) {
            var totalVessels = allVessels.length;
            var trackingUsers = allVessels.reduce(function(acc, v) { return acc + (v.tracking_users ? v.tracking_users.length : 0); }, 0);
            var sanctionedCount = allVessels.filter(function(v){ return v.sanctioned; }).length;
            var staleCount      = allVessels.filter(function(v){ var s = staleness(v.updated_at); return s.cls === 'stale'; }).length;
            var failuresCount   = allFailures.length;

            // Stat row — six small KPIs. stat-grid + stat-box classes are
            // styled in the mobile media query to rearrange to 3-up.
            var statsHtml = '<div class="stat-grid" style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;">' +
                '<div class="stat-box" style="flex:1;min-width:90px;background:var(--bg-elevated);border-radius:8px;padding:8px;text-align:center;">' +
                    '<div style="font-size:1.2rem;font-weight:700;">'+totalVessels+'</div><div style="font-size:.62rem;color:var(--text-soft);">Vessels</div></div>' +
                '<div class="stat-box" style="flex:1;min-width:90px;background:var(--bg-elevated);border-radius:8px;padding:8px;text-align:center;">' +
                    '<div style="font-size:1.2rem;font-weight:700;">'+trackingUsers+'</div><div style="font-size:.62rem;color:var(--text-soft);">Trackings</div></div>' +
                '<div class="stat-box" style="flex:1;min-width:90px;background:var(--bg-elevated);border-radius:8px;padding:8px;text-align:center;">' +
                    '<div style="font-size:1.2rem;font-weight:700;">'+allUsers.length+'</div><div style="font-size:.62rem;color:var(--text-soft);">Users</div></div>' +
                '<div class="stat-box" style="flex:1;min-width:90px;background:var(--bg-elevated);border-radius:8px;padding:8px;text-align:center;'
                    +(sanctionedCount?'border:1px solid rgba(255,69,0,.4);':'')+'">' +
                    '<div style="font-size:1.2rem;font-weight:700;color:'+(sanctionedCount?'#ff6b35':'var(--text-main)')+';">'+sanctionedCount+'</div>' +
                    '<div style="font-size:.62rem;color:var(--text-soft);">🚨 Sanctioned</div></div>' +
                '<div class="stat-box" style="flex:1;min-width:90px;background:var(--bg-elevated);border-radius:8px;padding:8px;text-align:center;'
                    +(staleCount?'border:1px solid rgba(239,68,68,.4);':'')+'">' +
                    '<div style="font-size:1.2rem;font-weight:700;color:'+(staleCount?'var(--danger)':'var(--text-main)')+';">'+staleCount+'</div>' +
                    '<div style="font-size:.62rem;color:var(--text-soft);">Stale &gt;6h</div></div>' +
                '<div class="stat-box" style="flex:1;min-width:90px;background:var(--bg-elevated);border-radius:8px;padding:8px;text-align:center;'
                    +(failuresCount?'border:1px solid rgba(239,68,68,.4);':'')+'">' +
                    '<div style="font-size:1.2rem;font-weight:700;color:'+(failuresCount?'var(--danger)':'var(--text-main)')+';">'+failuresCount+'</div>' +
                    '<div style="font-size:.62rem;color:var(--text-soft);">Scrape Fails</div></div>' +
                '</div>';

            // Failure card — only shown if there are any flapping IMOs
            var failuresHtml = '';
            if (allFailures.length) {
                var rowsHtml = allFailures.slice(0, 25).map(function(f){
                    var trackerStr = (f.trackers && f.trackers.length) ? f.trackers.map(esc).join(', ') : '<em style="color:var(--text-soft);opacity:.7;">untracked</em>';
                    return '<div class="failures-row">' +
                        '<span class="imo">'+esc(f.imo)+'</span>' +
                        '<span class="name">'+esc(f.name)+'</span>' +
                        '<span class="cnt" title="Consecutive scrape failures">'+f.count+' fail'+(f.count===1?'':'s')+'</span>' +
                        '<span style="color:var(--text-soft);font-size:.68rem;max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+trackerStr+'</span>' +
                        '</div>';
                }).join('');
                var moreHtml = allFailures.length > 25
                    ? '<div style="margin-top:6px;font-size:.68rem;color:var(--text-soft);">+ '+(allFailures.length - 25)+' more…</div>' : '';
                failuresHtml = '<div class="failures-card">' +
                    '<div class="title">⚠️ Scraper failures (' + allFailures.length + ')</div>' +
                    rowsHtml + moreHtml +
                    '</div>';
            }

            // Vessel table — sanction badge + freshness dot + tooltip
            var tableHtml = '<div style="overflow-x:auto;">' +
                '<table class="admin-table"><thead><tr>' +
                    '<th><input type="checkbox" id="fleetCheckAll" title="Select all"></th>' +
                    '<th>IMO</th><th>Vessel</th><th>Flag</th><th>Status</th>' +
                    '<th>Last AIS</th><th>Tracked by</th><th></th>' +
                '</tr></thead><tbody>' +
                allVessels.map(function(v) {
                    var s = staleness(v.updated_at);
                    var sancBadge = v.sanctioned
                        ? '<span class="sanc-badge" title="'+esc((v.sanction_lists||[]).join(' · '))+'">🚨 SANC</span>'
                        : '';
                    var usersStr = (v.tracking_users || []).map(function(u){ return esc(u.username); }).join(', ') || '<em style="color:var(--text-soft);opacity:.7;">—</em>';
                    return '<tr'+(v.sanctioned?' style="background:rgba(255,69,0,.04);"':'')+'>' +
                        '<td><input type="checkbox" class="fleet-check" data-imo="'+esc(String(v.imo))+'"></td>' +
                        '<td>'+esc(v.imo)+'</td>' +
                        '<td>'+esc(v.name || 'IMO '+v.imo)+sancBadge+'</td>' +
                        '<td>'+esc(v.flag || '—')+'</td>' +
                        '<td>'+esc(v.status || 'PENDING')+'</td>' +
                        '<td><span class="stale-dot '+s.cls+'" title="Last AIS update"></span>'+esc(s.label)+'</td>' +
                        '<td>'+usersStr+'</td>' +
                        '<td><button class="action-btn danger js-remove-vessel" data-imo="'+esc(String(v.imo))+'" title="Remove from ALL trackers">✕</button></td>' +
                    '</tr>';
                }).join('') +
                '</tbody></table></div>' +
                '<div style="margin-top:10px;"><button class="action-btn danger js-bulk-remove">🗑 Remove Selected</button></div>';

            cnt.innerHTML = statsHtml + failuresHtml + tableHtml;

            // Delegated event listeners — no inline onclick anywhere
            var checkAll = document.getElementById('fleetCheckAll');
            if (checkAll) {
                checkAll.addEventListener('change', function() {
                    document.querySelectorAll('.fleet-check').forEach(function(c){ c.checked = checkAll.checked; });
                });
            }
            cnt.addEventListener('click', function(ev) {
                var rm = ev.target.closest('.js-remove-vessel');
                if (rm) { window._removeGlobal(rm.getAttribute('data-imo')); return; }
                var bulk = ev.target.closest('.js-bulk-remove');
                if (bulk) { window._bulkRemove(); }
            });

            window._removeGlobal = async function(imo) {
                if (!/^\d{7}$/.test(String(imo))) { showToast('Invalid IMO format.', 'warning'); return; }
                if (!confirm('Remove IMO ' + imo + ' from ALL users?')) return;
                try {
                    var res = await api(window.CONFIG.WORKER_URL + '/admin/fleet/bulk-remove', {
                        method: 'POST', headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
                        body: JSON.stringify({ admin_token: token, imos: [imo] })
                    });
                    if (!res.ok) throw new Error('Failed');
                    showToast('IMO ' + imo + ' removed', 'success');
                    await loadData();
                    switchTab('fleet');
                } catch(e) { showToast('Error: ' + e.message, 'danger'); }
            };
            window._bulkRemove = async function() {
                var checks = document.querySelectorAll('.fleet-check:checked');
                // Sanitise client-side too — only valid 7-digit IMOs are sent
                var imos = Array.from(checks)
                    .map(function(c){ return c.dataset.imo; })
                    .filter(function(i){ return /^\d{7}$/.test(String(i)); });
                if (!imos.length) { showToast('No vessels selected.', 'warning'); return; }
                if (imos.length > 100) { showToast('Max 100 at a time.', 'warning'); return; }
                if (!confirm('Remove ' + imos.length + ' vessel(s) from ALL users?')) return;
                try {
                    var res = await api(window.CONFIG.WORKER_URL + '/admin/fleet/bulk-remove', {
                        method: 'POST', headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
                        body: JSON.stringify({ admin_token: token, imos: imos })
                    }, 20000);
                    if (!res.ok) throw new Error('Failed');
                    showToast(imos.length + ' vessel(s) removed', 'success');
                    await loadData();
                    switchTab('fleet');
                } catch(e) { showToast('Error: ' + e.message, 'danger'); }
            };
        }

        // ── BULK ADD TAB ─────────────────────────────────────────────
        function renderBulkTab(cnt) {
            // Sort users alphabetically for usability with many users
            var sortedUsers = allUsers.slice().sort(function(a, b) {
                return (a.username || '').localeCompare(b.username || '');
            });
            var opts = sortedUsers.map(function(u){
                return '<option value="'+esc(String(u.id))+'">'+esc(u.username)+'</option>';
            }).join('');
            cnt.innerHTML = '<h3 style="margin-bottom:10px;">Add Vessels to a User in Bulk</h3>' +
                '<div style="background:var(--bg-elevated);border-radius:8px;padding:14px;">' +
                '<label>Select user:</label>' +
                '<select id="bulkUser" style="width:100%;margin-bottom:10px;">'+opts+'</select>' +
                '<label>Paste IMOs <span style="color:var(--text-soft);font-weight:normal;">(one per line or comma-separated, max 200)</span></label>' +
                // maxlength prevents pathological pastes from freezing the page
                '<textarea id="bulkImo" rows="6" maxlength="20000" placeholder="9123456&#10;9876543&#10;…"></textarea>' +
                '<div style="display:flex;gap:8px;margin-top:12px;align-items:center;flex-wrap:wrap;">' +
                    '<button class="btn btn-primary js-bulk-add">Add Vessels</button>' +
                    '<span id="bulkCount" style="font-size:.72rem;color:var(--text-soft);"></span>' +
                '</div>' +
                '<div id="bulkResult" style="margin-top:10px;font-size:.78rem;"></div></div>';

            // Live IMO counter as the admin pastes
            var ta = document.getElementById('bulkImo');
            var counter = document.getElementById('bulkCount');
            function recount() {
                if (!ta || !counter) return;
                var found = ta.value.split(/[,\n\s]+/).filter(function(s){ return /^\d{7}$/.test(s.trim()); });
                counter.textContent = found.length ? '✓ ' + found.length + ' valid IMO' + (found.length === 1 ? '' : 's') + ' detected' : '';
                counter.style.color = found.length > 200 ? 'var(--warning)' : 'var(--text-soft)';
            }
            if (ta) ta.addEventListener('input', recount);

            // Delegated click for the Add button
            cnt.addEventListener('click', function(ev) {
                if (ev.target.closest('.js-bulk-add')) window._bulkAdd();
            });

            window._bulkAdd = async function() {
                var userId = document.getElementById('bulkUser').value;
                var raw = document.getElementById('bulkImo').value;
                if (!userId) { showToast('Pick a user first.', 'warning'); return; }
                if (raw.length > 20000) { showToast('Input too large.', 'danger'); return; }

                // Dedupe + validate format
                var imos = [...new Set(
                    raw.split(/[,\n\s]+/)
                       .map(function(s){ return s.trim(); })
                       .filter(function(s){ return /^\d{7}$/.test(s); })
                )];
                if (!imos.length) { showToast('No valid IMOs found.', 'warning'); return; }
                if (imos.length > 200) { showToast('Max 200 IMOs at once. Got ' + imos.length + '.', 'warning'); return; }

                // Checksum validation (catches typos before the round-trip)
                var invalid = imos.filter(function(i){ return !validateIMO(i); });
                if (invalid.length) {
                    showToast(invalid.length + ' IMO(s) fail checksum: ' + invalid.slice(0, 5).join(', ') + (invalid.length > 5 ? '…' : ''), 'danger');
                    return;
                }

                var resultEl = document.getElementById('bulkResult');
                if (resultEl) { resultEl.textContent = 'Sending…'; resultEl.style.color = 'var(--text-soft)'; }
                try {
                    var res = await api(window.CONFIG.WORKER_URL + '/admin/fleet/bulk-add', {
                        method: 'POST', headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
                        body: JSON.stringify({ admin_token: token, user_id: userId, imos: imos })
                    }, 30000);
                    var data = await res.json();
                    if (!res.ok) throw new Error(data.error || 'Request failed');
                    document.getElementById('bulkImo').value = '';
                    if (counter) counter.textContent = '';
                    // textContent — never innerHTML — so server-controlled values are inert
                    if (resultEl) {
                        resultEl.textContent = '✅ ' + (data.added||0) + ' added, ' + (data.skipped||0) + ' skipped.';
                        resultEl.style.color = 'var(--success)';
                    }
                    showToast('Bulk add complete', 'success');
                } catch(e) {
                    if (resultEl) {
                        resultEl.textContent = 'Error: ' + e.message;
                        resultEl.style.color = 'var(--danger)';
                    }
                    showToast('Bulk add failed', 'danger');
                }
            };
        }

        // ── USERS TAB ────────────────────────────────────────────────
        function renderUsersTab(cnt) {
            cnt.innerHTML =
                '<button class="btn btn-primary js-add-user" style="margin-bottom:12px;">+ Add New User</button>' +
                '<div style="overflow-x:auto;"><table class="admin-table"><thead><tr>' +
                    '<th>Username</th>' +
                    '<th>Last Login</th>' +
                    '<th class="hide-mobile">Fleet</th>' +
                    '<th class="hide-mobile">CallMeBot</th>' +
                    '<th>Status</th>' +
                    '<th>Actions</th>' +
                '</tr></thead><tbody>' +
                allUsers.map(function(u) {
                    var badge = u.is_frozen ? '<span class="badge" style="background:rgba(239,68,68,.2);color:var(--danger);">Frozen</span>' :
                        (!u.can_add_vessels ? '<span class="badge" style="background:rgba(245,158,11,.2);color:var(--warning);">Ban Add</span>' : '<span class="badge" style="background:rgba(34,197,94,.2);color:var(--success);">Active</span>');
                    var lastLoginCell = u.last_login_at
                        ? '<span title="' + esc(formatAbsolute(u.last_login_at)) + '">' + esc(formatRelative(u.last_login_at)) + '</span>'
                        : '<span style="color:var(--text-soft);opacity:.6;" title="Has not logged in since this column existed">never</span>';
                    var safeId = esc(String(u.id));
                    return '<tr>' +
                        '<td>'+esc(u.username)+'</td>' +
                        '<td>'+lastLoginCell+'</td>' +
                        '<td class="hide-mobile">'+(u.vessels ? u.vessels.length : 0)+'</td>' +
                        '<td class="hide-mobile">'+(u.callmebot_enabled ? 'ON' : 'OFF')+'</td>' +
                        '<td>'+badge+'</td>' +
                        '<td>' +
                            '<button class="action-btn '+(u.is_frozen?'success':'danger')+' js-user-action" '
                                +'data-action="freeze" data-uid="'+safeId+'" data-current="'+(!!u.is_frozen)+'">'
                                +(u.is_frozen?'Unfreeze':'Freeze')+'</button> ' +
                            '<button class="action-btn '+(u.can_add_vessels?'danger':'success')+' js-user-action" '
                                +'data-action="ban" data-uid="'+safeId+'" data-current="'+(!!u.can_add_vessels)+'">'
                                +(u.can_add_vessels?'Ban':'Allow')+'</button> ' +
                            '<button class="action-btn js-user-action" data-action="edit" data-uid="'+safeId+'" title="Edit">✏️</button> ' +
                            '<button class="action-btn danger js-user-action" data-action="delete" data-uid="'+safeId+'" title="Delete">🗑</button>' +
                        '</td></tr>';
                }).join('') + '</tbody></table></div>';

            // Single delegated listener for the entire tab — bulletproof & cheap
            cnt.addEventListener('click', function(ev) {
                var addBtn = ev.target.closest('.js-add-user');
                if (addBtn) { window._addUserModal(); return; }
                var btn = ev.target.closest('.js-user-action');
                if (!btn) return;
                var act  = btn.getAttribute('data-action');
                var uid  = btn.getAttribute('data-uid');
                var curr = btn.getAttribute('data-current') === 'true';
                if (act === 'freeze') window._toggleFreeze(uid, curr);
                if (act === 'ban')    window._toggleBan(uid, curr);
                if (act === 'edit')   window._editUser(uid);
                if (act === 'delete') window._deleteUser(uid);
            });

            window._toggleFreeze = async function(uid, current) {
                if (!confirm((current?'Unfreeze':'Freeze')+' this user?')) return;
                try {
                    var res = await api(window.CONFIG.WORKER_URL + '/admin/user/status', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
                        body: JSON.stringify({ admin_token: token, user_id: uid, is_frozen: !current })
                    });
                    if (!res.ok) throw new Error('Failed');
                    showToast('Status updated', 'success');
                    await loadData(); switchTab('users');
                } catch(e) { showToast(e.message, 'danger'); }
            };
            window._toggleBan = async function(uid, current) {
                if (!confirm((current?'Ban':'Allow')+' adding vessels?')) return;
                try {
                    var res = await api(window.CONFIG.WORKER_URL + '/admin/user/status', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
                        body: JSON.stringify({ admin_token: token, user_id: uid, can_add_vessels: !current })
                    });
                    if (!res.ok) throw new Error('Failed');
                    showToast('Status updated', 'success');
                    await loadData(); switchTab('users');
                } catch(e) { showToast(e.message, 'danger'); }
            };
            window._editUser = function(uid) {
                var u = allUsers.find(function(x){ return x.id === uid; });
                if (!u) return;
                var m = document.getElementById('userEditModal');
                if (m) m.remove();
                document.body.insertAdjacentHTML('beforeend',
                    '<div class="modal" id="userEditModal"><div class="modal-inner">' +
                    '<h3>Edit '+esc(u.username)+'</h3>' +
                    '<label>Phone</label><input id="euPhone" maxlength="32" value="'+esc(u.callmebot_phone||'')+'">' +
                    '<label>API Key</label><input id="euApikey" maxlength="64" value="'+esc(u.callmebot_apikey||'')+'">' +
                    '<label>CallMeBot</label><select id="euCm"><option value="true" '+(u.callmebot_enabled?'selected':'')+'>ON</option><option value="false" '+(!u.callmebot_enabled?'selected':'')+'>OFF</option></select>' +
                    '<label>New PIN (optional)</label><input id="euPin" type="password" inputmode="numeric" autocomplete="new-password" pattern="\\d{4,6}" minlength="4" maxlength="6">' +
                    '<div style="margin-top:14px;display:flex;gap:8px;justify-content:flex-end;">' +
                    '<button class="btn btn-secondary" data-action="cancel-edit">Cancel</button>' +
                    '<button class="btn btn-primary" data-action="save-edit" data-uid="'+esc(uid)+'">Save</button>' +
                    '</div></div></div>');
                // Wire actions via delegation — no inline JS, no onclick attrs
                var modal = document.getElementById('userEditModal');
                modal.addEventListener('click', function(ev) {
                    var btn = ev.target.closest('button[data-action]'); if (!btn) return;
                    var act = btn.getAttribute('data-action');
                    if (act === 'cancel-edit') { modal.remove(); return; }
                    if (act === 'save-edit')   { window._saveEdit(btn.getAttribute('data-uid')); }
                });
                wireModalClose('userEditModal');
            };
            window._saveEdit = async function(uid) {
                var phone = document.getElementById('euPhone').value.trim();
                var apikey = document.getElementById('euApikey').value.trim();
                var cm = document.getElementById('euCm').value === 'true';
                var pin = document.getElementById('euPin').value.trim();
                try {
                    var res = await api(window.CONFIG.WORKER_URL + '/admin/user/update', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
                        body: JSON.stringify({ admin_token: token, user_id: uid, callmebot_phone: phone, callmebot_apikey: apikey, callmebot_enabled: cm })
                    });
                    if (!res.ok) throw new Error('Settings update failed');
                    if (pin && /^\d{4,6}$/.test(pin)) {
                        res = await api(window.CONFIG.WORKER_URL + '/admin/user/pin', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
                            body: JSON.stringify({ admin_token: token, user_id: uid, new_pin: pin })
                        });
                        if (!res.ok) throw new Error('PIN reset failed');
                    }
                    var m = document.getElementById('userEditModal'); if (m) m.remove();
                    showToast('User updated', 'success');
                    await loadData(); switchTab('users');
                } catch(e) { showToast(e.message, 'danger'); }
            };
            window._deleteUser = async function(uid) {
                var u = allUsers.find(function(x){ return x.id === uid; });
                if (!u) return;
                var typed = prompt('This will DELETE user "' + u.username + '" and all their tracked vessels. This cannot be undone.\n\nType the username to confirm:');
                if (typed === null) return;          // cancelled
                if (typed.trim() !== u.username) {
                    showToast('Username did not match — deletion cancelled.', 'warning');
                    return;
                }
                try {
                    var res = await api(window.CONFIG.WORKER_URL + '/admin/user/delete', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
                        body: JSON.stringify({ admin_token: token, user_id: uid })
                    });
                    if (!res.ok) {
                        var err = await res.json().catch(function(){ return {}; });
                        throw new Error(err.error || 'Failed');
                    }
                    showToast('User deleted', 'success');
                    await loadData(); switchTab('users');
                } catch(e) { showToast(e.message, 'danger'); }
            };
            window._addUserModal = function() {
                var m = document.getElementById('addUserModal'); if (m) m.remove();
                document.body.insertAdjacentHTML('beforeend',
                    '<div class="modal" id="addUserModal"><div class="modal-inner"><h3>New User</h3>' +
                    '<label>Username</label>' +
                    '<input id="nuName" placeholder="3-32 chars, letters/digits/underscore" maxlength="32" autocomplete="off" spellcheck="false">' +
                    '<label>PIN (4-6 digits)</label>' +
                    '<input id="nuPin" type="password" inputmode="numeric" autocomplete="new-password" pattern="\\d{4,6}" minlength="4" maxlength="6" placeholder="••••">' +
                    '<div style="margin-top:14px;display:flex;gap:8px;justify-content:flex-end;">' +
                    '<button class="btn btn-secondary" data-action="cancel-create">Cancel</button>' +
                    '<button class="btn btn-primary" data-action="create-user">Create</button>' +
                    '</div></div></div>');
                var modal = document.getElementById('addUserModal');
                modal.addEventListener('click', function(ev) {
                    var btn = ev.target.closest('button[data-action]'); if (!btn) return;
                    var act = btn.getAttribute('data-action');
                    if (act === 'cancel-create') { modal.remove(); return; }
                    if (act === 'create-user')   { window._createUser(); }
                });
                wireModalClose('addUserModal');
                // Auto-focus the first field
                setTimeout(function(){ var f = document.getElementById('nuName'); if (f) f.focus(); }, 60);
            };
            window._createUser = async function() {
                var name = document.getElementById('nuName').value.trim();
                var pin  = document.getElementById('nuPin').value.trim();
                // Stricter validation than before — match the worker's regex
                if (!/^[a-zA-Z0-9_]{3,32}$/.test(name)) {
                    showToast('Username: 3-32 chars, letters/digits/underscore only.', 'warning'); return;
                }
                if (!/^\d{4,6}$/.test(pin)) {
                    showToast('PIN must be 4-6 digits.', 'warning'); return;
                }
                try {
                    var res = await api(window.CONFIG.WORKER_URL + '/admin/user/create', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
                        body: JSON.stringify({ admin_token: token, username: name, pin: pin })
                    });
                    if (!res.ok) { var e = await res.json().catch(function(){ return {}; }); throw new Error(e.error||'Creation failed'); }
                    var m = document.getElementById('addUserModal'); if (m) m.remove();
                    showToast('User created', 'success');
                    await loadData(); switchTab('users');
                } catch(e) { showToast(e.message, 'danger'); }
            };
        }

        // ── HANDOFFS TAB ─────────────────────────────────────────────
        // Lazy-loads on first switch — handoff data is its own endpoint
        // (/admin/handoffs) so it doesn't bloat the initial dashboard payload.
        async function renderHandoffsTab(cnt) {
            cnt.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-soft);">Loading handoffs…</div>';

            // Always re-fetch when the tab is opened so the admin sees current state
            try {
                var res = await api(window.CONFIG.WORKER_URL + '/admin/handoffs',
                    { headers: { Authorization: 'Bearer ' + token } }, 15000);
                if (res.status === 401 || res.status === 403) {
                    showLoginPrompt(res.status === 403 ? 'Forbidden' : 'Session Expired');
                    return;
                }
                if (!res.ok) throw new Error('HTTP ' + res.status);
                var data = await res.json();
                allHandoffs  = data.handoffs || [];
                handoffStats = data.stats || null;
            } catch(e) {
                cnt.innerHTML = '<div style="padding:20px;color:var(--danger);">Failed to load handoffs: ' + esc(e.message) + '</div>';
                return;
            }

            paintHandoffs(cnt);
        }

        function paintHandoffs(cnt) {
            var s = handoffStats || { total:0, sof:0, dossier:0, pending:0, accepted:0, declined:0 };

            // Top stats row — stat-grid class so mobile media query rearranges to 3-up
            var statsHtml = '<div class="stat-grid" style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;">' +
                '<div class="stat-box" style="flex:1;min-width:90px;background:var(--bg-elevated);border-radius:8px;padding:8px;text-align:center;">' +
                    '<div style="font-size:1.2rem;font-weight:700;">'+s.total+'</div><div style="font-size:.62rem;color:var(--text-soft);">Total</div></div>' +
                '<div class="stat-box" style="flex:1;min-width:90px;background:var(--bg-elevated);border-radius:8px;padding:8px;text-align:center;">' +
                    '<div style="font-size:1.2rem;font-weight:700;color:#38bdf8;">'+s.sof+'</div><div style="font-size:.62rem;color:var(--text-soft);">SOF</div></div>' +
                '<div class="stat-box" style="flex:1;min-width:90px;background:var(--bg-elevated);border-radius:8px;padding:8px;text-align:center;">' +
                    '<div style="font-size:1.2rem;font-weight:700;color:#c084fc;">'+s.dossier+'</div><div style="font-size:.62rem;color:var(--text-soft);">Dossier</div></div>' +
                '<div class="stat-box" style="flex:1;min-width:90px;background:var(--bg-elevated);border-radius:8px;padding:8px;text-align:center;">' +
                    '<div style="font-size:1.2rem;font-weight:700;color:var(--warning);">'+s.pending+'</div><div style="font-size:.62rem;color:var(--text-soft);">Pending</div></div>' +
                '<div class="stat-box" style="flex:1;min-width:90px;background:var(--bg-elevated);border-radius:8px;padding:8px;text-align:center;">' +
                    '<div style="font-size:1.2rem;font-weight:700;color:var(--success);">'+s.accepted+'</div><div style="font-size:.62rem;color:var(--text-soft);">Accepted</div></div>' +
                '<div class="stat-box" style="flex:1;min-width:90px;background:var(--bg-elevated);border-radius:8px;padding:8px;text-align:center;">' +
                    '<div style="font-size:1.2rem;font-weight:700;color:var(--danger);">'+s.declined+'</div><div style="font-size:.62rem;color:var(--text-soft);">Declined</div></div>' +
                '</div>';

            // Filter chips — all / sof / dossier / pending / accepted / declined.
            // No inline onclick — delegated below.
            var chips = [
                { id: 'all',      label: 'All ('+s.total+')' },
                { id: 'sof',      label: 'SOF ('+s.sof+')' },
                { id: 'dossier',  label: 'Dossier ('+s.dossier+')' },
                { id: 'pending',  label: 'Pending ('+s.pending+')' },
                { id: 'accepted', label: 'Accepted ('+s.accepted+')' },
                { id: 'declined', label: 'Declined ('+s.declined+')' }
            ];
            var chipsHtml = '<div style="margin-bottom:10px;display:flex;flex-wrap:wrap;align-items:center;">' +
                chips.map(function(c){
                    return '<button class="filter-chip ' + (handoffFilter === c.id ? 'active' : '') + '" '
                         + 'data-filter-id="' + esc(c.id) + '">' + esc(c.label) + '</button>';
                }).join('') +
                '<button class="filter-chip js-handoff-refresh" style="margin-left:auto;">🔄 Refresh</button>' +
                '</div>';

            // Apply filter
            var filtered = allHandoffs.filter(function(h) {
                if (handoffFilter === 'all') return true;
                if (handoffFilter === 'sof' || handoffFilter === 'dossier') return h.type === handoffFilter;
                return h.status === handoffFilter; // pending/accepted/declined
            });

            var tableHtml;
            if (!filtered.length) {
                tableHtml = '<div style="padding:30px;text-align:center;color:var(--text-soft);font-size:.78rem;">No handoffs match this filter.</div>';
            } else {
                tableHtml = '<div style="overflow-x:auto;">' +
                    '<table class="admin-table"><thead><tr>' +
                        '<th>Type</th><th>Date sent</th><th>From → To</th><th>Vessel</th>' +
                        '<th>Status</th><th>Responded</th><th></th>' +
                    '</tr></thead><tbody>' +
                    filtered.map(function(h) {
                        // Whitelist server-supplied values used as class names
                        // — even though we control the worker, defence-in-depth
                        // means we never paste arbitrary strings into class="…".
                        var safeType   = (h.type === 'sof' || h.type === 'dossier') ? h.type : 'sof';
                        var safeStatus = (h.status === 'pending' || h.status === 'accepted' || h.status === 'declined') ? h.status : 'pending';
                        var notesAttr = h.notes ? ' title="' + esc(h.notes) + '"' : '';
                        return '<tr' + notesAttr + '>' +
                            '<td><span class="handoff-type ' + safeType + '">' + safeType.toUpperCase() + '</span></td>' +
                            '<td><span title="' + esc(formatAbsolute(h.created_at)) + '">' + esc(formatRelative(h.created_at)) + '</span></td>' +
                            '<td>' + esc(h.from_username || '?') + ' → <strong>' + esc(h.to_username || '?') + '</strong></td>' +
                            '<td>' + esc(h.vessel_name || '') + ' <span style="color:var(--text-soft);">(' + esc(h.imo) + ')</span></td>' +
                            '<td><span class="handoff-pill ' + safeStatus + '">' + safeStatus.toUpperCase() + '</span></td>' +
                            '<td>' + (h.responded_at
                                ? '<span title="' + esc(formatAbsolute(h.responded_at)) + '">' + esc(formatRelative(h.responded_at)) + '</span>'
                                : '<span style="color:var(--text-soft);opacity:.5;">—</span>') + '</td>' +
                            '<td><button class="action-btn js-view-handoff" data-handoff-type="' + safeType + '" data-handoff-id="' + esc(String(h.id)) + '" title="View full content">👁 View</button></td>' +
                        '</tr>';
                    }).join('') +
                    '</tbody></table></div>';
            }

            cnt.innerHTML = statsHtml + chipsHtml + tableHtml;

            // ONE delegated listener handles every button in the tab — chips,
            // refresh, and view. Cheaper than N listeners and bulletproof
            // against re-renders.
            cnt.addEventListener('click', function(ev) {
                var view = ev.target.closest('.js-view-handoff');
                if (view) {
                    window._viewHandoff(view.getAttribute('data-handoff-type'), view.getAttribute('data-handoff-id'));
                    return;
                }
                var refresh = ev.target.closest('.js-handoff-refresh');
                if (refresh) { window._reloadHandoffs(); return; }
                var chip = ev.target.closest('button[data-filter-id]');
                if (chip) { window._setHandoffFilter(chip.getAttribute('data-filter-id')); }
            });
        }

        window._setHandoffFilter = function(id) {
            handoffFilter = id;
            paintHandoffs(document.getElementById('tabContent'));
        };

        window._reloadHandoffs = function() {
            renderHandoffsTab(document.getElementById('tabContent'));
        };

        window._viewHandoff = async function(type, id) {
            try {
                // Open modal placeholder immediately so the admin gets visual feedback
                var existing = document.getElementById('handoffViewModal');
                if (existing) existing.remove();
                document.body.insertAdjacentHTML('beforeend',
                    '<div class="modal" id="handoffViewModal">' +
                    '<div class="modal-inner" style="max-width:640px;">' +
                    '<h3>Loading…</h3>' +
                    '<div class="handoff-detail" id="handoffDetailBody">'
                    + '<div style="padding:20px;text-align:center;color:var(--text-soft);">Fetching handoff…</div></div>' +
                    '<div style="margin-top:12px;text-align:right;">' +
                    '<button class="btn btn-secondary" data-action="close-handoff">Close</button>' +
                    '</div></div></div>');
                wireModalClose('handoffViewModal');
                var hvm = document.getElementById('handoffViewModal');
                if (hvm) {
                    hvm.addEventListener('click', function(ev){
                        var btn = ev.target.closest('button[data-action="close-handoff"]');
                        if (btn) hvm.remove();
                    });
                }
            } catch(e) {
                // If the modal can't be inserted (extremely unusual), fall back to a toast
                console.error('[_viewHandoff] modal insertion failed:', e);
                showToast('Could not open handoff view: ' + e.message, 'danger');
                return;
            }

            // The handoff list (allHandoffs) already has everything except draft_data.
            // We pre-populate the modal from it so the user sees something even if
            // the worker route isn't deployed yet.
            var fallback = (allHandoffs || []).find(function(h) {
                return h.type === type && String(h.id) === String(id);
            });
            if (fallback) {
                paintHandoffModal(Object.assign({}, fallback, { _partial: true }));
            }

            try {
                var res = await api(window.CONFIG.WORKER_URL + '/admin/handoff/' + type + '/' + id,
                    { headers: { Authorization: 'Bearer ' + token } }, 10000);

                if (res.status === 404) {
                    // Two sub-cases — the route exists but the row is gone, OR the
                    // route doesn't exist on the worker yet. Both arrive as 404; we
                    // tell them apart by the response shape (our route returns
                    // {error:'Handoff not found'}, the default returns {error:'Not found'}).
                    var errBody = await res.json().catch(function(){ return {}; });
                    var routeMissing = errBody.error === 'Not found';
                    if (routeMissing && fallback) {
                        // We already painted the partial — append a hint banner.
                        var bodyEl = document.getElementById('handoffDetailBody');
                        if (bodyEl) {
                            bodyEl.insertAdjacentHTML('afterbegin',
                                '<div style="background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.4);'
                                + 'border-radius:6px;padding:8px 10px;margin-bottom:10px;font-size:.7rem;color:var(--warning);">'
                                + '⚠️ Worker route not deployed yet — showing partial data from list. '
                                + 'Redeploy <code>Cloudflare_worker.js</code> to see <code>draft_data</code>.</div>');
                        }
                        return;
                    }
                    // Row really doesn't exist
                    var body1 = document.getElementById('handoffDetailBody');
                    if (body1) body1.innerHTML = '<div style="color:var(--danger);padding:10px;">Handoff #' + esc(String(id)) + ' not found in database.</div>';
                    return;
                }

                if (!res.ok) {
                    var err = await res.json().catch(function(){ return {}; });
                    throw new Error(err.error || 'HTTP ' + res.status);
                }
                var data = await res.json();
                paintHandoffModal(data.handoff);
            } catch(e) {
                console.error('[_viewHandoff] fetch failed:', e);
                var body2 = document.getElementById('handoffDetailBody');
                if (body2) body2.innerHTML = '<div style="color:var(--danger);padding:10px;">' + esc(e.message) + '</div>';
            }
        };

        // Paint the modal contents — pulled out so the fallback path can reuse it.
        function paintHandoffModal(h) {
            var modal = document.getElementById('handoffViewModal');
            if (!modal) return;
            var hd = modal.querySelector('h3');
            if (hd) hd.innerHTML =
                '<span class="handoff-type ' + h.type + '">' + h.type.toUpperCase() + '</span> '
                + esc(h.vessel_name || ('IMO ' + h.imo))
                + ' <span class="handoff-pill ' + h.status + '" style="margin-left:6px;">' + h.status + '</span>';
            var body = document.getElementById('handoffDetailBody');
            if (body) body.innerHTML = renderHandoffDetail(h);
        }

        // Render the handoff body — generic for both SOF and dossier.
        // SOF draft_data is a flat-ish object with the form fields the user
        // had filled in; dossier has port/templates. We render top-level
        // primitive keys as KV rows, arrays of objects as small tables, and
        // anything else as a compact JSON dump.
        function renderHandoffDetail(h) {
            var meta = '';
            meta += '<div class="kv"><div class="k">From</div><div class="v">'+esc(h.from_username||'?')+'</div></div>';
            meta += '<div class="kv"><div class="k">To</div><div class="v">'+esc(h.to_username||'?')+'</div></div>';
            meta += '<div class="kv"><div class="k">IMO</div><div class="v">'+esc(h.imo||'')+'</div></div>';
            meta += '<div class="kv"><div class="k">Vessel</div><div class="v">'+esc(h.vessel_name||'')+'</div></div>';
            meta += '<div class="kv"><div class="k">Sent</div><div class="v">'+esc(formatAbsolute(h.created_at))+' ('+esc(formatRelative(h.created_at))+')</div></div>';
            if (h.responded_at) {
                meta += '<div class="kv"><div class="k">Responded</div><div class="v">'+esc(formatAbsolute(h.responded_at))+' ('+esc(formatRelative(h.responded_at))+')</div></div>';
            }
            if (h.notes) {
                meta += '<div class="kv"><div class="k">Notes</div><div class="v" style="white-space:pre-wrap;">'+esc(h.notes)+'</div></div>';
            }

            var dd = h.draft_data;
            if (!dd || typeof dd !== 'object') {
                return meta + '<div style="margin-top:10px;color:var(--text-soft);font-style:italic;">No draft data.</div>';
            }

            var body = '<div style="margin-top:12px;font-weight:600;color:var(--text-soft);font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;">Draft contents</div>';
            for (var key in dd) {
                if (!Object.prototype.hasOwnProperty.call(dd, key)) continue;
                var v = dd[key];
                if (v === null || v === undefined || v === '') continue;
                body += '<div class="kv"><div class="k">'+esc(key)+'</div><div class="v">'+renderHandoffValue(v)+'</div></div>';
            }
            return meta + body;
        }

        function renderHandoffValue(v) {
            if (v === null || v === undefined) return '<span style="color:var(--text-soft);">—</span>';
            if (typeof v === 'boolean') return v ? '✓ yes' : '✗ no';
            if (typeof v === 'number')  return esc(String(v));
            if (typeof v === 'string')  return esc(v).replace(/\n/g, '<br>');

            if (Array.isArray(v)) {
                if (!v.length) return '<span style="color:var(--text-soft);">empty</span>';
                // Array of plain objects → compact table
                if (typeof v[0] === 'object' && v[0] !== null && !Array.isArray(v[0])) {
                    var keys = Array.from(v.reduce(function(acc, row){
                        Object.keys(row || {}).forEach(function(k){ acc.add(k); });
                        return acc;
                    }, new Set()));
                    if (keys.length && keys.length <= 8) {
                        var html = '<table class="ops-table"><thead><tr>' +
                            keys.map(function(k){ return '<th>'+esc(k)+'</th>'; }).join('') +
                            '</tr></thead><tbody>' +
                            v.map(function(row){
                                return '<tr>' + keys.map(function(k){
                                    var cell = row && row[k] != null ? row[k] : '';
                                    return '<td>'+esc(typeof cell === 'object' ? JSON.stringify(cell) : String(cell))+'</td>';
                                }).join('') + '</tr>';
                            }).join('') +
                            '</tbody></table>';
                        return html;
                    }
                }
                // Plain array (strings, numbers, mixed)
                return v.map(function(item){
                    return typeof item === 'object'
                        ? '<code>'+esc(JSON.stringify(item))+'</code>'
                        : esc(String(item));
                }).join(', ');
            }

            // Object → JSON dump
            try { return '<pre>'+esc(JSON.stringify(v, null, 2))+'</pre>'; }
            catch(_) { return '<span style="color:var(--text-soft);">[unserialisable]</span>'; }
        }

        // ── BROADCAST PUSH NOTIFICATIONS ─────────────────────────────
        // Three recipient modes: All (everyone with a push subscription),
        // Active (allUsers minus frozen — uses already-loaded list, no extra query),
        // or Select (checklist of all users).
        window._broadcastModal = function() {
            var existing = document.getElementById('broadcastModal');
            if (existing) existing.remove();

            // We need allUsers loaded for the Active and Select modes. If the
            // admin opens broadcast before /admin/full-data has returned, prompt.
            if (!allUsers || !allUsers.length) {
                showToast('User list not loaded yet. Try again in a second.', 'warning');
                return;
            }

            var userCheckboxes = allUsers.map(function(u) {
                var label = esc(u.username);
                if (u.is_frozen) label += ' <span style="color:var(--danger);font-size:.65rem;">(frozen)</span>';
                else if (!u.can_add_vessels) label += ' <span style="color:var(--warning);font-size:.65rem;">(restricted)</span>';
                return '<label style="display:flex;align-items:center;gap:6px;font-size:.73rem;padding:3px 0;cursor:pointer;">' +
                    '<input type="checkbox" class="bc-user-check" value="' + esc(u.id) + '"> ' + label +
                '</label>';
            }).join('');

            document.body.insertAdjacentHTML('beforeend',
                '<div class="modal" id="broadcastModal">' +
                '<div class="modal-inner" style="max-width:520px;">' +
                    '<h3>📢 Broadcast Push Notification</h3>' +
                    '<label>Recipients</label>' +
                    '<select id="bcRecipients">' +
                        '<option value="all">All users (with push subscription)</option>' +
                        '<option value="active">Active users only (skip frozen)</option>' +
                        '<option value="selected">Select users…</option>' +
                    '</select>' +

                    '<div id="bcUserList" style="display:none;max-height:200px;overflow-y:auto;border:1px solid var(--border);' +
                        'border-radius:6px;padding:8px;background:var(--bg-elevated);margin-top:6px;">' +
                        '<div style="display:flex;gap:8px;margin-bottom:6px;padding-bottom:6px;border-bottom:1px solid var(--border);">' +
                            '<button class="action-btn" data-bc-action="select-all" style="flex:1;">Select all</button>' +
                            '<button class="action-btn" data-bc-action="clear-all" style="flex:1;">Clear</button>' +
                        '</div>' +
                        userCheckboxes +
                    '</div>' +

                    '<label style="margin-top:10px;">Title <span style="color:var(--text-soft);font-weight:normal;">(max 80)</span></label>' +
                    '<input id="bcTitle" maxlength="80" placeholder="🚢 Quick update">' +

                    '<label style="margin-top:6px;">Message <span style="color:var(--text-soft);font-weight:normal;">(max 500)</span></label>' +
                    '<textarea id="bcMsg" rows="4" maxlength="500" placeholder="Your announcement…"></textarea>' +

                    '<div style="margin-top:14px;display:flex;gap:8px;justify-content:flex-end;">' +
                        '<button class="btn btn-secondary" data-bc-action="cancel">Cancel</button>' +
                        '<button class="btn btn-primary" data-bc-action="send">📤 Send</button>' +
                    '</div>' +
                '</div></div>');

            // Delegated event handlers — replaces all the old inline onclick
            var bcModal = document.getElementById('broadcastModal');
            bcModal.addEventListener('click', function(ev) {
                var btn = ev.target.closest('button[data-bc-action]'); if (!btn) return;
                var act = btn.getAttribute('data-bc-action');
                if (act === 'cancel')     { bcModal.remove(); return; }
                if (act === 'select-all') { window._bcSelectAll(true);  return; }
                if (act === 'clear-all')  { window._bcSelectAll(false); return; }
                if (act === 'send')       { window._sendBroadcast(); }
            });
            // Listen on the dropdown via change event (avoids inline onchange)
            var bcSel = document.getElementById('bcRecipients');
            if (bcSel) bcSel.addEventListener('change', window._bcToggleUserList);
            wireModalClose('broadcastModal');
        };

        window._bcToggleUserList = function() {
            var sel = document.getElementById('bcRecipients');
            var list = document.getElementById('bcUserList');
            if (sel && list) list.style.display = sel.value === 'selected' ? 'block' : 'none';
        };

        window._bcSelectAll = function(state) {
            document.querySelectorAll('.bc-user-check').forEach(function(c) { c.checked = !!state; });
        };

        window._sendBroadcast = async function() {
            var titleEl = document.getElementById('bcTitle');
            var msgEl   = document.getElementById('bcMsg');
            var modeEl  = document.getElementById('bcRecipients');
            if (!titleEl || !msgEl || !modeEl) return;

            var title = titleEl.value.trim();
            var msg   = msgEl.value.trim();
            var mode  = modeEl.value;
            if (!title || !msg) { showToast('Title and message are required.', 'warning'); return; }

            var userIds = null;
            var recipientLabel = '';
            if (mode === 'selected') {
                var checks = document.querySelectorAll('.bc-user-check:checked');
                userIds = Array.from(checks).map(function(c) { return c.value; });
                if (!userIds.length) { showToast('Select at least one user, or change recipients.', 'warning'); return; }
                recipientLabel = userIds.length + ' selected user' + (userIds.length === 1 ? '' : 's');
            } else if (mode === 'active') {
                userIds = (allUsers || []).filter(function(u) { return !u.is_frozen; }).map(function(u) { return u.id; });
                if (!userIds.length) { showToast('No active users to broadcast to.', 'warning'); return; }
                recipientLabel = userIds.length + ' active user' + (userIds.length === 1 ? '' : 's');
            } else {
                recipientLabel = 'all users with push enabled';
            }

            if (!confirm('Send "' + title + '" to ' + recipientLabel + '?')) return;

            // Disable buttons during send so the admin can't double-fire
            var sendBtn = Array.from(document.querySelectorAll('#broadcastModal button')).find(function(b){ return /Send/.test(b.textContent); });
            if (sendBtn) { sendBtn.disabled = true; sendBtn.textContent = 'Sending…'; }

            try {
                var body = { title: title, message: msg };
                if (userIds) body.user_ids = userIds;
                var res = await api(window.CONFIG.WORKER_URL + '/admin/broadcast', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
                    body: JSON.stringify(body),
                }, 30000);
                if (!res.ok) {
                    var err = await res.json().catch(function(){ return {}; });
                    throw new Error(err.error || 'HTTP ' + res.status);
                }
                var data = await res.json();
                var modal = document.getElementById('broadcastModal');
                if (modal) modal.remove();
                if (data.users_count === 0) {
                    showToast('Sent to 0 users — no one has push enabled.', 'warning');
                } else {
                    var summary = '✅ Reached ' + data.users_count + ' user' + (data.users_count === 1 ? '' : 's')
                                + ' (' + data.sent + ' delivered'
                                + (data.failed ? ', ' + data.failed + ' failed' : '') + ')';
                    showToast(summary, 'success');
                }
            } catch(e) {
                console.error('[broadcast] failed:', e);
                showToast('Broadcast failed: ' + e.message, 'danger');
                if (sendBtn) { sendBtn.disabled = false; sendBtn.textContent = '📤 Send'; }
            }
        };

        // ── INIT ─────────────────────────────────────────────────────
        mainEl.innerHTML =
            '<div class="admin-header" style="display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;">' +
                '<div class="header-label" style="font-size:.78rem;color:var(--text-soft);">Admin Dashboard</div>' +
                '<button id="broadcastBtn" class="btn btn-primary" style="padding:10px 16px;font-size:.8rem;">📢 Broadcast</button>' +
            '</div>' +
            '<div class="admin-tabs" id="tabs" role="tablist"></div>' +
            '<div id="tabContent"><div style="padding:20px;text-align:center;color:var(--text-soft);">Loading…</div></div>';
        // Wire the broadcast button via addEventListener (no inline onclick)
        var bcBtn = document.getElementById('broadcastBtn');
        if (bcBtn) bcBtn.addEventListener('click', function(){ window._broadcastModal(); });

        var tabDefs = [
            { id:'fleet',    label:'🚢 Fleet Manager' },
            { id:'bulk',     label:'📥 Bulk Add' },
            { id:'users',    label:'👥 User Manager' },
            { id:'handoffs', label:'📋 Handoffs' }
        ];
        var tabsEl = document.getElementById('tabs');
        tabDefs.forEach(function(t) {
            var b = document.createElement('button');
            b.className = 'admin-tab';
            b.setAttribute('data-id', t.id);
            b.setAttribute('role', 'tab');
            b.setAttribute('type', 'button');
            b.textContent = t.label;
            b.addEventListener('click', function(){ switchTab(t.id); });
            tabsEl.appendChild(b);
        });

        loadData().then(function(ok){ if (ok) switchTab('fleet'); });
    })();
    </script>
</body>
</html>
