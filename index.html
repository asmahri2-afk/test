<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>VesselTracker v5.5 — Maritime Operations</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="description" content="Real-time maritime vessel tracking and monitoring system" />
    <meta name="theme-color" content="#020c1a" />
    
    <link rel="manifest" href="manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%23020c1a' width='180' height='180'/><circle cx='90' cy='90' r='54' fill='%230ea5e9'/><path d='M90 36 L70 90 L110 90 Z' fill='%23fff'/></svg>" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%23020c1a' width='192' height='192'/><circle cx='96' cy='96' r='60' fill='%230ea5e9'/><path d='M96 36 L76 96 L116 96 Z' fill='%23fff'/></svg>" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"></script>
    
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <!-- HEADER -->
    <div class="app-header">
        <div class="header-brand">
            <div class="radar-wrap">
                <div class="radar-core">
                    <div class="radar-ring"></div>
                    <div class="radar-ring"></div>
                    <div class="radar-ring"></div>
                    <div class="radar-dot"></div>
                </div>
            </div>
            <div class="brand-text">
                <h1>VesselTracker</h1>
                <span>v5.5</span>
            </div>
        </div>
        <div class="header-right">
            <div class="header-clock" id="headerClock">--:-- UTC</div>
            <button class="icon-btn" id="langToggle" title="Language">FR</button>
            <button class="icon-btn" id="viewListBtn" class="active" title="List view">📋</button>
            <button class="icon-btn" id="viewMapBtn" title="Map view">🗺</button>
            <button class="icon-btn" id="refreshButton" title="Refresh">🔄</button>
            <button class="icon-btn" id="exportButton" title="Export CSV">📊</button>
            <button class="icon-btn" id="alertsBtn" title="Alerts">
                📍
                <span class="badge hidden" id="alertBadge">0</span>
            </button>
        </div>
    </div>

    <!-- STATUS BAR -->
    <div class="status-bar">
        <span id="statusMsg" class="status-msg">Ready</span>
        <span id="apiStatus" class="api-status" style="border:1px solid rgba(100,116,139,.3);padding:2px 6px;border-radius:4px;font-size:.65rem;">API: Checking...</span>
        <span id="sanctionsStatus" style="padding:2px 6px;font-size:.65rem;color:var(--text-soft);"></span>
    </div>

    <!-- KPI BAR -->
    <div class="kpi-bar">
        <div class="kpi-item">
            <span class="kpi-label">Tracked</span>
            <span class="kpi-value" id="vesselCount">0</span>
        </div>
        <div class="kpi-item">
            <span class="kpi-label">Underway</span>
            <span class="kpi-value" id="kpiUnderway">0</span>
        </div>
        <div class="kpi-item">
            <span class="kpi-label">At Port</span>
            <span class="kpi-value" id="kpiAtPort">0</span>
        </div>
        <div class="kpi-item">
            <span class="kpi-label">Anchor</span>
            <span class="kpi-value" id="kpiAtAnchor">0</span>
        </div>
        <div class="kpi-item">
            <span class="kpi-label">Stalled</span>
            <span class="kpi-value" id="kpiStalled">0</span>
        </div>
        <div class="kpi-item">
            <span class="kpi-label">Updated</span>
            <span class="kpi-value" id="lastUpdatedTime">--</span>
        </div>
    </div>

    <!-- MAIN CONTAINER -->
    <div class="main-container">
        <!-- LIST VIEW -->
        <div id="listView" class="list-view">
            <!-- ADD VESSEL -->
            <div class="add-card" id="addCard">
                <h3>Add Vessel</h3>
                <div class="add-vessel-form">
                    <input type="text" id="imoInput" class="input-field" placeholder="IMO (7-digit)" maxlength="7" autocomplete="off" />
                    <button id="addBtn" class="btn-primary">Track</button>
                </div>
                <div id="namePreview"></div>
                <p class="form-hint">Enter IMO number to track</p>
            </div>

            <!-- FILTER SECTION -->
            <div class="filter-section" id="filterSection">
                <div class="filter-header">
                    <h4>Filters</h4>
                    <button class="icon-btn mobile-close-btn" id="filterCloseBtn">✕</button>
                </div>
                
                <div class="filter-group">
                    <label>Status</label>
                    <select id="statusFilter" class="select-field">
                        <option value="ALL">All</option>
                        <option value="UNDERWAY">Underway</option>
                        <option value="AT PORT">At Port</option>
                        <option value="AT ANCHOR">At Anchor</option>
                        <option value="STALLED">Stalled</option>
                        <option value="DATA PENDING">Data Pending</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label>Signal Age</label>
                    <select id="ageFilter" class="select-field">
                        <option value="ALL">All</option>
                        <option value="1H">Last 1 hour</option>
                        <option value="6H">Last 6 hours</option>
                        <option value="24H">Last 24 hours</option>
                        <option value="STALE">Stale (>24h)</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label>Sort by</label>
                    <select id="sortSelect" class="select-field">
                        <option value="PRIORITY">Priority / Sanctions</option>
                        <option value="AGE_DESC">Newest signal</option>
                        <option value="AGE_ASC">Oldest signal</option>
                        <option value="NAME_ASC">Name (A-Z)</option>
                        <option value="NAME_DESC">Name (Z-A)</option>
                        <option value="STATUS_ASC">Status</option>
                    </select>
                </div>

                <div class="filter-info">
                    <span id="dataStats">Loading...</span>
                </div>
            </div>

            <!-- VESSELS LIST -->
            <div class="vessels-container" id="vesselsContainer"></div>
        </div>

        <!-- MAP VIEW -->
        <div id="mapView" class="map-view" style="display: none;">
            <div id="map" class="map-container"></div>
            <div class="map-legend">
                <div class="legend-item">
                    <div class="legend-color underway"></div>
                    <span>Underway</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color port"></div>
                    <span>At Port</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color anchor"></div>
                    <span>At Anchor</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color stalled"></div>
                    <span>Stalled</span>
                </div>
            </div>
        </div>
    </div>

    <!-- MOBILE FILTER FAB -->
    <button class="fab-filter" id="fabFilter" style="display: none;">⚙ FILTER</button>

    <!-- ALERTS PANEL -->
    <div id="alertOverlay" class="alert-overlay" style="display: none;"></div>
    <div id="alertPanel" class="alert-panel">
        <div class="alert-header">
            <h2>Alerts</h2>
            <button class="btn-secondary" onclick="markAllAlertsRead()" style="font-size:.75rem;padding:4px 8px;">Mark all read</button>
            <button class="btn-secondary" onclick="clearAlerts()" style="font-size:.75rem;padding:4px 8px;">Clear</button>
        </div>
        <div id="alertList" class="alert-list"></div>
    </div>

    <!-- CONFIRM MODAL -->
    <div id="confirmModal" class="modal-backdrop" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Confirm</h2>
            </div>
            <div class="modal-body" id="confirmText"></div>
            <div class="modal-footer">
                <button class="btn-secondary" id="confirmCancel">Cancel</button>
                <button class="btn-danger" id="confirmOk">Remove</button>
            </div>
        </div>
    </div>

    <!-- LOADING OVERLAY -->
    <div id="loadingOverlay" class="loading-overlay hidden">
        <div class="spinner" style="width: 40px; height: 40px;"></div>
        <p id="loadingText" style="margin-top: 12px; font-size: .85rem;">Loading...</p>
    </div>

    <!-- SYSTEM INFO -->
    <div class="system-info">
        <span id="systemHealth">System health: 0%</span>
    </div>

    <script src="translations.js"></script>
    <script src="script.js"></script>
</body>
</html>
