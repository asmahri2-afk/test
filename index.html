<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>VesselTracker v5.5 — Maritime Operations</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="description" content="Real-time maritime vessel tracking and monitoring system" />
    <meta name="theme-color" content="#020c1a" />
    
    <!-- PWA MANIFEST -->
    <link rel="manifest" href="manifest.json" />
    
    <!-- APPLE SETUP -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%23020c1a' width='180' height='180'/><circle cx='90' cy='90' r='54' fill='%230ea5e9'/><path d='M90 36 L70 90 L110 90 Z' fill='%23fff'/></svg>" />
    
    <!-- FAVICON -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%23020c1a' width='192' height='192'/><circle cx='96' cy='96' r='60' fill='%230ea5e9'/><path d='M96 36 L76 96 L116 96 Z' fill='%23fff'/></svg>" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"></script>
    
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <!-- HEADER -->
    <div class="app-header">
        <div class="header-brand">
            <div class="radar-wrap">
                <div class="radar-core">
                    <div class="radar-ring"></div>
                    <div class="radar-ring"></div>
                    <div class="radar-ring"></div>
                    <div class="radar-dot"></div>
                </div>
            </div>
            <div class="brand-text">
                <h1>VesselTracker</h1>
                <span>v5.5</span>
            </div>
        </div>
        <div class="header-right">
            <div class="header-clock" id="headerClock">--:--</div>
            <button class="icon-btn" id="langToggle" title="Langue / Language" data-lang="EN">FR</button>
            <button class="icon-btn" id="mapToggle" title="Show/hide map">🗺</button>
            <button class="icon-btn" id="settingsBtn" title="Settings">⚙</button>
            <button class="icon-btn" id="alertsBtn" title="Alerts">
                📍
                <span class="badge hidden" id="alertBadge">0</span>
            </button>
        </div>
    </div>

    <!-- KPI BAR -->
    <div class="kpi-bar">
        <div class="kpi-item">
            <span class="kpi-label" data-i18n="tracked">Tracked</span>
            <span class="kpi-value" id="kpiTracked">0</span>
        </div>
        <div class="kpi-item">
            <span class="kpi-label" data-i18n="underway">Underway</span>
            <span class="kpi-value" id="kpiUnderway">0</span>
        </div>
        <div class="kpi-item">
            <span class="kpi-label" data-i18n="port">At Port</span>
            <span class="kpi-value" id="kpiPort">0</span>
        </div>
        <div class="kpi-item">
            <span class="kpi-label" data-i18n="warnings">Warnings</span>
            <span class="kpi-value" id="kpiWarnings">0</span>
        </div>
        <div class="kpi-item" id="lastUpdatedKpi">
            <span class="kpi-label" data-i18n="lastUpdate">Last update</span>
            <span class="kpi-value" id="lastUpdatedTime">--</span>
        </div>
    </div>

    <!-- MAIN CONTAINER -->
    <div class="main-container">
        <!-- LEFT PANEL -->
        <div class="left-panel" id="leftPanel">
            <!-- ADD VESSEL CARD -->
            <div class="add-card" id="addCard">
                <h3 data-i18n="addVessel">Add Vessel</h3>
                <div class="add-vessel-form">
                    <input 
                        type="text" 
                        id="imoInput" 
                        class="input-field" 
                        placeholder="IMO (7-digit)" 
                        maxlength="7"
                        autocomplete="off"
                    />
                    <button id="addBtn" class="btn-primary" data-i18n="track">Track</button>
                </div>
                <p class="form-hint" data-i18n="imoHint">Enter vessel IMO number</p>
            </div>

            <!-- FILTER & SORT CONTROLS -->
            <div class="filter-section" id="filterSection">
                <div class="filter-header">
                    <h4 data-i18n="filter">Filter</h4>
                    <button class="icon-btn mobile-close-btn" id="filterCloseBtn">✕</button>
                </div>
                
                <div class="filter-group">
                    <label data-i18n="status">Status</label>
                    <select id="statusFilter" class="select-field">
                        <option value="ALL" data-i18n="all">All</option>
                        <option value="UNDERWAY" data-i18n="underway">Underway</option>
                        <option value="AT PORT" data-i18n="atPort">At Port</option>
                        <option value="AT ANCHOR" data-i18n="atAnchor">At Anchor</option>
                        <option value="STALLED" data-i18n="stalled">Stalled</option>
                        <option value="DATA PENDING" data-i18n="dataPending">Data Pending</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label data-i18n="signalAge">Signal Age</label>
                    <select id="ageFilter" class="select-field">
                        <option value="ALL" data-i18n="all">All</option>
                        <option value="1H" data-i18n="last1Hour">Last 1 hour</option>
                        <option value="6H" data-i18n="last6Hours">Last 6 hours</option>
                        <option value="24H" data-i18n="last24Hours">Last 24 hours</option>
                        <option value="STALE" data-i18n="stale">Stale (>24h)</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label data-i18n="sort">Sort by</label>
                    <select id="sortSelect" class="select-field">
                        <option value="PRIORITY" data-i18n="priority">Priority / Sanctions</option>
                        <option value="AGE_DESC" data-i18n="newestSignal">Newest signal</option>
                        <option value="AGE_ASC" data-i18n="oldestSignal">Oldest signal</option>
                        <option value="NAME_ASC" data-i18n="nameAsc">Name (A-Z)</option>
                        <option value="NAME_DESC" data-i18n="nameDesc">Name (Z-A)</option>
                        <option value="STATUS_ASC" data-i18n="statusAsc">Status</option>
                    </select>
                </div>

                <div class="filter-info" id="filterInfo" style="display: none;">
                    <span id="filteredCount">0</span> <span data-i18n="ofTotal">of</span> <span id="totalCount">0</span>
                </div>
            </div>

            <!-- VESSELS LIST -->
            <div class="vessels-container" id="vesselsContainer"></div>
        </div>

        <!-- MAP PANEL -->
        <div class="map-panel" id="mapPanel">
            <div id="map" class="map-container"></div>
            <div class="map-legend" id="mapLegend">
                <div class="legend-item">
                    <div class="legend-color underway"></div>
                    <span data-i18n="underway">Underway</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color port"></div>
                    <span data-i18n="atPort">At Port</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color anchor"></div>
                    <span data-i18n="atAnchor">At Anchor</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color stalled"></div>
                    <span data-i18n="stalled">Stalled</span>
                </div>
            </div>
        </div>
    </div>

    <!-- MOBILE FILTER TOGGLE -->
    <button class="fab-filter" id="fabFilter" title="Filters" style="display: none;">⚙ FILTER</button>

    <!-- MODALS -->
    <div class="modal-backdrop" id="confirmModal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2 data-i18n="confirm">Confirm</h2>
            </div>
            <div class="modal-body" id="confirmText"></div>
            <div class="modal-footer">
                <button class="btn-secondary" id="confirmCancel" data-i18n="cancel">Cancel</button>
                <button class="btn-danger" id="confirmOk" data-i18n="remove">Remove</button>
            </div>
        </div>
    </div>

    <!-- PULL-TO-REFRESH INDICATOR -->
    <div id="ptrIndicator" class="ptr-indicator"></div>

    <script src="translations.js"></script>
    <script src="script.js"></script>
</body>
</html>
