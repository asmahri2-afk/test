<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vessel Tracker</title>

<link rel="stylesheet" href="styles.css">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>

<body>

<header class="app-header">
<h2>Vessel Tracker</h2>
<input id="searchInput" placeholder="Search IMO or name">
</header>

<div id="map"></div>

<div class="map-legend">

<div class="legend-item" data-filter="underway">
<div class="legend-color legend-underway"></div>
<span>Underway</span>
</div>

<div class="legend-item" data-filter="port">
<div class="legend-color legend-port"></div>
<span>At Port</span>
</div>

<div class="legend-item" data-filter="warning">
<div class="legend-color legend-warning"></div>
<span>Warning</span>
</div>

<div class="legend-item" data-filter="critical">
<div class="legend-color legend-danger"></div>
<span>Critical</span>
</div>

<div class="legend-item" data-filter="sanction">
<div class="legend-color legend-sanction"></div>
<span>Sanctioned</span>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
