<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#020c1a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>VesselTracker</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><circle cx='96' cy='96' r='90' fill='%230ea5e9'/><path d='M96 36 L70 120 L122 120 Z' fill='white'/></svg>">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: system-ui, -apple-system, sans-serif;
            background: #020c1a;
            color: #c8d8e8;
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { color: #0ea5e9; margin-bottom: 10px; }
        .status { 
            background: #081626;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }
        .info {
            background: #081626;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            font-size: 14px;
            line-height: 1.6;
        }
        button {
            background: #0ea5e9;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px 5px 10px 0;
        }
        button:hover { background: #38bdf8; }
        .success { color: #10b981; }
        .error { color: #ef4444; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚓ VesselTracker v5.4</h1>
        <p>Maritime Operations</p>
        
        <div class="status">
            <h2>PWA Status</h2>
            <p>Manifest: <span id="manifest-status">Checking...</span></p>
            <p>Service Worker: <span id="sw-status">Checking...</span></p>
            <p>Installable: <span id="install-status">Checking...</span></p>
        </div>

        <div class="info">
            <h3>Install Instructions</h3>
            <p>1. Look for "Install" button in Chrome menu (⋮)</p>
            <p>2. Or wait for "Install app?" popup at bottom</p>
            <p>3. Tap to add VesselTracker to your home screen</p>
        </div>

        <button onclick="testManifest()">Test Manifest</button>
        <button onclick="testServiceWorker()">Test Service Worker</button>
        <button onclick="location.reload()">Refresh Page</button>
    </div>

    <script>
        // Check manifest
        async function testManifest() {
            try {
                const response = await fetch('./manifest.json');
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('manifest-status').textContent = '✅ Loaded';
                    document.getElementById('manifest-status').className = 'success';
                    console.log('Manifest:', data);
                } else {
                    document.getElementById('manifest-status').textContent = '❌ Failed to load';
                    document.getElementById('manifest-status').className = 'error';
                }
            } catch(e) {
                document.getElementById('manifest-status').textContent = '❌ ' + e.message;
                document.getElementById('manifest-status').className = 'error';
            }
        }

        // Check service worker
        async function testServiceWorker() {
            if ('serviceWorker' in navigator) {
                try {
                    const registration = await navigator.serviceWorker.register('./sw.js');
                    document.getElementById('sw-status').textContent = '✅ Registered';
                    document.getElementById('sw-status').className = 'success';
                    console.log('Service Worker registered:', registration);
                } catch(e) {
                    document.getElementById('sw-status').textContent = '❌ ' + e.message;
                    document.getElementById('sw-status').className = 'error';
                }
            } else {
                document.getElementById('sw-status').textContent = '❌ Not supported';
                document.getElementById('sw-status').className = 'error';
            }
        }

        // Run checks on load
        window.addEventListener('load', async () => {
            testManifest();
            testServiceWorker();
            
            // Check installability
            if ('BeforeInstallPromptEvent' in window) {
                document.getElementById('install-status').textContent = '✅ Yes';
                document.getElementById('install-status').className = 'success';
            } else {
                document.getElementById('install-status').textContent = '⚠️ Check manifest/SW';
                document.getElementById('install-status').className = 'error';
            }
        });
    </script>
</body>
</html>
